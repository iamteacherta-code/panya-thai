<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PANYA · Activity Sheets — Tone Mark Hunt (Advanced)</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   PANYA · Tone Mark Hunt Activity Sheets (Advanced)
   Printable A4 — find, sort and apply the four Thai tone marks
   ( ่ ้ ๊ ๋ ), with ผันวรรณยุกต์ across the three consonant classes,
   live / dead syllables and reading tone. Same earth-wood-leaf
   design as the rest of the Thai Literacy Studio.
   ============================================================ */
:root{
  --bg:#f4efe4; --surface:#fbf8f1; --line:#e3d9c4; --line-2:#d6c8ab;
  --ink:#2f2a20; --ink-2:#5c5341; --ink-3:#8a7e66;
  --leaf:#5b7a4b; --leaf-d:#45603a; --leaf-l:#e6eddf;
  --earth:#c98a3b; --earth-d:#a86d24; --earth-l:#f6e8d2;
  --clay:#b05c3c; --clay-l:#f3ddd2; --sky:#6f9bb0; --sky-l:#e2ecf1;
  --ghost:#d8cdb4;
  --font-ui:"Sarabun",system-ui,-apple-system,sans-serif;
  --font-thai:"TH Sarabun","Sarabun",sans-serif;
  --font-hand:"Mali","Sarabun",sans-serif;
}
@font-face{font-family:"TH Sarabun";src:url("fonts/Sarabun-Regular.ttf") format("truetype");font-weight:100 500;font-style:normal;font-display:swap;}
@font-face{font-family:"TH Sarabun";src:url("fonts/Sarabun-Bold.ttf") format("truetype");font-weight:501 900;font-style:normal;font-display:swap;}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-ui);color:var(--ink);background:var(--bg);
  background-image:radial-gradient(circle at 1px 1px, rgba(120,100,60,.07) 1px, transparent 0);
  background-size:22px 22px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

/* ---------- Toolbar ---------- */
.toolbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:12px 22px;background:rgba(251,248,241,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.toolbar .tb-title{font-weight:800;letter-spacing:.04em;}
.toolbar .tb-title small{display:block;font-weight:600;color:var(--ink-3);font-size:12px;letter-spacing:.02em;}
.toolbar .spacer{margin-left:auto;}
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink);
  font-family:inherit;font-weight:700;font-size:14px;padding:10px 16px;border-radius:999px;cursor:pointer;}
.btn-primary{background:var(--earth);color:#fff;border-color:var(--earth-d);box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);}
.btn-primary:hover{background:var(--earth-d);}
.btn-home{text-decoration:none;background:var(--leaf);color:#fff;border-color:var(--leaf-d);box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);margin-right:4px;}
.btn-home:hover{background:var(--leaf-d);}
.hint{color:var(--ink-3);font-size:13px;}

/* ---------- Sheet (A4) ---------- */
.sheets{padding:26px 14px 60px;display:flex;flex-direction:column;align-items:center;gap:26px;}
.sheet{width:210mm;min-height:297mm;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:10px;
  box-shadow:0 2px 6px rgba(60,48,28,.08),0 22px 50px -22px rgba(60,48,28,.30);
  padding:15mm 14mm 13mm;position:relative;overflow:hidden;display:flex;flex-direction:column;}

/* fill-the-page practice panel */
.extra{flex:1;min-height:60px;margin-top:14px;border:1.8px dashed var(--line-2);border-radius:16px;
  background:repeating-linear-gradient(45deg,transparent 0 12px,rgba(170,140,90,.045) 12px 24px);
  padding:12px 18px 16px;display:flex;flex-direction:column;}
.extra .ex-head{font-size:13px;color:var(--earth-d);font-weight:800;font-family:var(--font-thai);}
.extra .ex-head .th{color:var(--ink-3);font-weight:600;}
.extra .ex-space{flex:1;min-height:18px;}
.extra .ex-lines{display:flex;flex-direction:column;gap:24px;padding-bottom:2px;}
.extra .ex-lines .l{border-bottom:1.9px dotted var(--line-2);}

/* ---------- Header ---------- */
.sh-head{display:flex;align-items:flex-start;gap:16px;padding-bottom:12px;border-bottom:2px solid var(--leaf-l);}
.sh-brand{display:flex;align-items:center;gap:11px;flex:none;}
.sh-mark{width:46px;height:46px;flex:none;display:grid;place-items:center;}
.sh-mark img{width:100%;height:100%;object-fit:contain;}
.sh-mark .fallback{width:42px;height:42px;border-radius:11px;background:var(--leaf);color:#fff;display:grid;place-items:center;font-weight:800;font-size:20px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);}
.sh-brand .bn{font-weight:800;font-size:18px;letter-spacing:.26em;line-height:1;}
.sh-brand .bs{font-size:10.5px;color:var(--ink-3);letter-spacing:.04em;margin-top:2px;}
.sh-meta{flex:1;}
.sh-tag-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.eyebrow{font-size:10.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--earth-d);}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;background:var(--leaf-l);color:var(--leaf-d);}
.badge.earth{background:var(--earth-l);color:var(--earth-d);}
.badge.clay{background:var(--clay-l);color:var(--clay);}
.sh-title{font-size:21px;font-weight:800;margin:5px 0 1px;letter-spacing:-.01em;}
.sh-title .th{font-family:var(--font-thai);font-weight:500;color:var(--ink-2);font-size:17px;}
.sh-fields{flex:none;display:flex;flex-direction:column;gap:7px;min-width:188px;}
.fld{display:flex;align-items:flex-end;gap:7px;font-size:12px;font-weight:700;color:var(--ink-2);}
.fld .th{font-family:var(--font-thai);font-weight:500;color:var(--ink-3);font-size:11px;}
.fld .ln{flex:1;border-bottom:1.6px dotted var(--line-2);height:17px;}
.fld.small{min-width:0;}

/* ---------- Instructions ---------- */
.instruct{display:flex;align-items:center;gap:10px;margin:13px 0 10px;font-size:13.5px;color:var(--ink-2);}
.instruct .n{flex:none;width:24px;height:24px;border-radius:8px;background:var(--earth);color:#fff;font-weight:800;display:grid;place-items:center;font-size:13px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.14);}
.instruct b{color:var(--ink);}
.instruct .th{font-family:var(--font-thai);font-weight:500;color:var(--ink-3);}
.thai{font-family:var(--font-thai);}
.note-th{font-family:var(--font-thai);font-size:12.5px;color:var(--ink-3);margin:-2px 0 8px;}
.emoji svg{width:1em;height:1em;display:block;fill:none;stroke:var(--ink);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}

/* ---------- Tone-mark intro cards ---------- */
.tone-intro{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:6px;}
.tcard{border:1.6px solid var(--line);border-radius:16px;background:var(--surface);padding:14px 16px;display:flex;align-items:center;gap:16px;}
.tcard .mk{font-family:var(--font-thai);font-size:60px;color:var(--clay);line-height:1;flex:none;width:74px;text-align:center;}
.tcard .info{flex:1;}
.tcard .nm{font-family:var(--font-thai);font-size:24px;font-weight:600;color:var(--ink);}
.tcard .en{font-size:12px;color:var(--ink-3);}
.tcard .trace{display:flex;gap:8px;margin-top:8px;}
.tcard .tbox{width:46px;height:50px;border:1.6px solid var(--line);border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-thai);font-size:34px;color:var(--clay);}
.tcard .tbox .g{color:transparent;-webkit-text-stroke:1.4px var(--ghost);}

/* ---------- Word wall ---------- */
.target-key{display:inline-flex;align-items:center;gap:12px;padding:8px 16px;border-radius:12px;background:var(--clay-l);border:1.6px solid var(--line-2);margin-bottom:10px;}
.target-key .mk{font-family:var(--font-thai);font-size:38px;color:var(--clay);line-height:1;}
.target-key .lbl{font-size:13px;color:var(--ink-2);font-weight:700;}
.target-key .lbl .th2{display:block;font-family:var(--font-thai);font-weight:500;color:var(--ink-3);}
.wordwall{border:1.8px solid var(--line);border-radius:16px;background:var(--surface);padding:16px 18px;display:flex;flex-wrap:wrap;gap:14px 26px;justify-content:center;font-family:var(--font-thai);font-size:32px;color:var(--ink);line-height:1.5;}

/* ---------- Tally ---------- */
.tally{display:flex;align-items:center;gap:16px;margin-top:13px;font-size:14px;color:var(--ink-2);font-family:var(--font-thai);flex-wrap:wrap;}
.tally .item{display:inline-flex;align-items:center;gap:8px;}
.tally .mk{font-family:var(--font-thai);font-size:30px;color:var(--clay);}
.tally .box{width:56px;height:40px;border:1.6px solid var(--line-2);border-radius:9px;background:#fff;}

/* ---------- Buckets (sort) ---------- */
.buckets{display:grid;gap:10px;margin-top:6px;}
.bucket{border:1.6px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:170px;}
.bucket .bhead{background:var(--leaf-l);color:var(--leaf-d);padding:8px 10px;text-align:center;font-family:var(--font-thai);font-weight:700;font-size:14px;}
.bucket .bhead .mk{font-size:30px;display:block;color:var(--clay);line-height:1;}
.bucket .bbody{flex:1;}

/* ---------- Ladder (ผันวรรณยุกต์) ---------- */
.ladder{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
.lad{display:grid;gap:8px;align-items:stretch;}
.lad .lead{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--earth-l);border:1.6px solid var(--line);border-radius:10px;font-family:var(--font-thai);color:var(--earth-d);padding:4px;}
.lad .lead .lm{font-size:30px;line-height:1;}
.lad .lead .lc{font-size:11px;color:var(--ink-3);}
.lcell{border:1.6px solid var(--line);border-radius:10px;background:var(--surface);padding:6px;text-align:center;display:flex;flex-direction:column;gap:5px;}
.lcell .lt{font-family:var(--font-thai);font-size:11.5px;color:var(--ink-3);}
.lcell .lt b{color:var(--clay);font-size:20px;}
.lcell .lbox{height:50px;border:1.6px solid var(--line);border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-thai);font-size:28px;color:var(--leaf-d);}

/* ---------- Match (line) ---------- */
.match{display:grid;grid-template-columns:1fr 1fr;gap:46px;margin-top:6px;}
.mcol{display:flex;flex-direction:column;gap:12px;justify-content:center;}
.mitem{position:relative;border:1.7px solid var(--line);border-radius:14px;background:var(--surface);min-height:62px;display:flex;align-items:center;padding:10px 16px;font-family:var(--font-thai);}
.mcol.left .mitem{justify-content:flex-start;font-size:34px;}
.mcol.right .mitem{justify-content:flex-end;font-size:17px;color:var(--ink-2);text-align:right;}
.node{width:15px;height:15px;border-radius:50%;border:2.5px solid var(--earth-d);background:#fff;position:absolute;top:50%;transform:translateY(-50%);}
.node.nR{right:-9px;} .node.nL{left:-9px;}

/* ---------- Choose mark ---------- */
.choose{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px;}
.ch-item{display:flex;align-items:center;gap:12px;border:1.6px solid var(--line);border-radius:14px;background:var(--surface);padding:11px 14px;min-height:72px;}
.ch-item .emoji{font-size:38px;flex:none;}
.ch-item .base{font-family:var(--font-thai);font-size:30px;color:var(--ink-3);}
.ch-item .meaning{font-family:var(--font-thai);font-size:12px;color:var(--ink-3);}
.ch-opts{display:flex;gap:7px;margin-left:auto;}
.optm{font-family:var(--font-thai);font-size:26px;border:1.8px solid var(--line-2);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#fff;color:var(--clay);}
.ch-item .wbox{width:78px;height:50px;border:1.8px solid var(--line);border-radius:9px;background:#fff;flex:none;}

/* ---------- Read & write tone name ---------- */
.tone-list{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-top:6px;}
.tl-item{display:flex;align-items:center;gap:12px;border:1.6px solid var(--line);border-radius:12px;background:var(--surface);padding:8px 14px;}
.tl-item .w{font-family:var(--font-thai);font-size:30px;color:var(--ink);min-width:96px;}
.tl-item .ans{flex:1;border-bottom:1.8px dotted var(--line-2);height:26px;}

/* ---------- Write-your-own slots ---------- */
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.slot{display:flex;align-items:center;gap:12px;border:1.6px solid var(--line);border-radius:14px;background:var(--surface);padding:12px 16px;min-height:72px;}
.slot .mk{font-family:var(--font-thai);font-size:34px;color:var(--clay);flex:none;width:50px;text-align:center;}
.slot .hint-th{font-family:var(--font-thai);font-size:13px;color:var(--ink-3);flex:none;width:96px;}
.slot .sline{flex:1;border-bottom:1.9px dotted var(--line-2);height:34px;}

/* ---------- Color legend ---------- */
.clegend{display:flex;flex-wrap:wrap;gap:10px 18px;padding:12px 16px;border:1.8px dashed var(--line-2);border-radius:14px;background:var(--earth-l);margin-bottom:12px;font-family:var(--font-thai);font-size:14px;}
.clegend .ci{display:inline-flex;align-items:center;gap:8px;}
.clegend .sw{width:22px;height:22px;border-radius:6px;border:1.6px solid var(--ink-3);}
.clegend .mk{font-size:24px;color:var(--clay);}

/* word bank */
.bank{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;align-items:center;padding:11px 16px;border:1.8px dashed var(--line-2);border-radius:14px;background:var(--earth-l);margin-bottom:6px;}
.bank .bk-lbl{font-family:var(--font-thai);font-size:12px;font-weight:700;color:var(--earth-d);margin-right:4px;}
.bank .chip{font-family:var(--font-thai);font-size:28px;font-weight:600;color:var(--ink);padding:0 4px;}

/* ---------- Footer ---------- */
.sh-foot{position:absolute;left:14mm;right:14mm;bottom:8mm;display:flex;align-items:center;justify-content:space-between;font-size:10.5px;color:var(--ink-3);border-top:1.4px solid var(--line);padding-top:7px;}
.sh-foot .th{font-family:var(--font-thai);}
.star-row{display:flex;align-items:center;gap:6px;}
.star{width:15px;height:15px;border:1.6px solid var(--line-2);border-radius:4px;}

/* ---------- Print ---------- */
@media print{
  @page{size:A4;margin:0;}
  body{background:#fff;background-image:none;}
  .toolbar{display:none !important;}
  .sheets{padding:0;gap:0;}
  .sheet{width:210mm;min-height:297mm;box-shadow:none;border:none;border-radius:0;page-break-after:always;break-after:page;}
  .sheet:last-child{page-break-after:auto;break-after:auto;}
}
</style>
</head>
<body>

<div class="toolbar">
  <a class="btn btn-home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก · Home</a>
  <div class="tb-title">PANYA · Activity Sheets
    <small>Tone Mark Hunt · ตามหาวรรณยุกต์ — Advanced</small>
  </div>
  <span class="spacer"></span>
  <span class="hint">20 แผ่น · พิมพ์ลงกระดาษ A4</span>
  <button class="btn btn-primary" onclick="window.print()">🖨️ พิมพ์ / Print</button>
</div>

<div class="sheets" id="sheets"></div>

<script src="activity-art.js"></script>
<script>
const art = window.artIcon;
const DOT = '◌';
const mg = (m) => DOT + m;                 // a tone mark sitting on a dotted carrier

/* ---------- shared scaffold ---------- */
const LOGO = '<div class="sh-mark"><img src="images/panya-logo.png" alt="PANYA" '
  + 'onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<div class=&quot;fallback&quot;>P</div>\'"></div>';
function head(no, kind, en, th){
  return '<header class="sh-head"><div class="sh-brand">' + LOGO
    + '<div><div class="bn">PANYA</div><div class="bs">Thai Foundation</div></div></div>'
    + '<div class="sh-meta"><div class="sh-tag-row">'
    + '<span class="eyebrow">Tone Mark Hunt</span>'
    + '<span class="badge clay">Advanced · ขั้นสูง</span>'
    + '<span class="badge earth">แบบที่ ' + no + ' · ' + kind + '</span></div>'
    + '<div class="sh-title">' + en + (th ? ' <span class="th">· ' + th + '</span>' : '') + '</div></div>'
    + '<div class="sh-fields">'
    + '<div class="fld">ชื่อ <span class="th">Name</span> <span class="ln"></span></div>'
    + '<div class="fld small">วันที่ <span class="th">Date</span> <span class="ln"></span>'
    + '&nbsp;ห้อง <span class="th">Class</span> <span class="ln"></span></div></div></header>';
}
function instruct(n, en, th){
  return '<div class="instruct"><span class="n">' + n + '</span><span><b>' + en + '</b> '
    + '<span class="th">' + th + '</span></span></div>';
}
function foot(){
  return '<footer class="sh-foot"><span class="th">PANYA Thai Foundation · ตามหาวรรณยุกต์ — Tone Mark Hunt (ขั้นสูง)</span>'
    + '<span class="star-row">ระบายดาวเมื่อทำเสร็จ <span class="star"></span><span class="star"></span><span class="star"></span></span></footer>';
}
function sheet(inner){ return '<section class="sheet">' + inner + '</section>'; }
const EXTRA = '<div class="extra"><div class="ex-head">✏️ ฝึกต่อ · Practice more '
  + '<span class="th">— เขียนคำที่มีวรรณยุกต์ที่หนูชอบ 2 คำ แล้ววาดภาพประกอบ</span></div>'
  + '<div class="ex-space"></div>'
  + '<div class="ex-lines"><span class="l"></span><span class="l"></span></div></div>';
const wall = (words) => '<div class="wordwall">' + words.map(w => '<span class="w">' + w + '</span>').join('') + '</div>';

/* ---------- the four tone marks ---------- */
const MARKS = [
  { m:'่', th:'ไม้เอก',    en:'mai ek',       tone:'เอก' },
  { m:'้', th:'ไม้โท',     en:'mai tho',      tone:'โท' },
  { m:'๊', th:'ไม้ตรี',    en:'mai tri',      tone:'ตรี' },
  { m:'๋', th:'ไม้จัตวา',  en:'mai chattawa', tone:'จัตวา' },
];

/* ---------- word pools (real, common words by tone mark) ---------- */
const EK   = ['ป่า','อ่าน','ไก่','พ่อ','ปู่','สี่','ที่','ข่าว','ถ่าน','ใส่','ส่ง','เก่ง','ก่อน','ต่อ','ผ่าน','อ่าง','เป่า','เสื่อ'];
const THO  = ['ม้า','น้ำ','บ้าน','ป้า','น้า','ฟ้า','ห้า','ได้','ใช้','ไม้','ต้น','น้อง','รู้','ซื้อ','ขึ้น','ช้าง','ห้อง','เท้า','ร้อน','ข้าว','เสื้อ'];
const TRI  = ['โต๊ะ','ก๊อก','ตุ๊กตา','จ๊ะ','ก๊าซ','เก๊','ป๊า'];
const CHAT = ['จ๋า','ก๋วยเตี๋ยว','ตุ๋น','เดี๋ยว','ก๋ง','ป๋า','เก๋'];
const NONE = ['กา','ตา','มา','ปลา','ดู','หู','จาน','ดิน','นก','ขา','ปู','งู','ดาว','ชา','มือ'];

const SHEETS = [];

/* === 1 · meet the four tone marks === */
(function(){
  const cards = MARKS.map(k =>
    '<div class="tcard"><span class="mk">' + mg(k.m) + '</span><div class="info">'
    + '<div class="nm">' + k.th + ' <span style="color:var(--clay)">' + mg(k.m) + '</span></div>'
    + '<div class="en">' + k.en + ' · เสียง' + k.tone + '</div>'
    + '<div class="trace"><span class="tbox">' + mg(k.m) + '</span>'
    + '<span class="tbox"><span class="g">' + mg(k.m) + '</span></span>'
    + '<span class="tbox"><span class="g">' + mg(k.m) + '</span></span>'
    + '<span class="tbox"></span></div></div></div>').join('');
  SHEETS.push(sheet(head(1,'Meet the marks','รู้จักรูปวรรณยุกต์ทั้ง 4')
    + instruct(1,'Name and trace each tone mark','อ่านชื่อ แล้วลากตามรอยรูปวรรณยุกต์ทั้งสี่ ( ◌ = ที่วางบนพยัญชนะ )')
    + '<div class="note-th">ภาษาไทยมี 5 เสียงวรรณยุกต์ (สามัญ เอก โท ตรี จัตวา) และมีรูปวรรณยุกต์ 4 รูป — เสียงสามัญไม่มีรูป</div>'
    + '<div class="tone-intro">' + cards + '</div>' + EXTRA + foot()));
})();

/* === hunt builders === */
function huntSheet(no, k, words){

    + '<div class="target-key"><span class="mk">' + mg(k.m) + '</span>'
    + '<span class="lbl">วงกลมทุกคำที่มี “' + k.th + '” ( ' + mg(k.m) + ' )'
    + '<span class="th2">circle every word with ' + k.en + '</span></span></div>'

/* === 6 · sort by mark === */
function bucketSheet(no, en, th, intrTh, bank, buckets){
  const cols = buckets.length;
  const b = bank.length
    ? '<div class="bank"><span class="bk-lbl">คำให้เลือก · word bank</span>'
      + bank.map(w => '<span class="chip">' + w + '</span>').join('') + '</div>'
    : '';
  const cells = buckets.map(bk =>
    '<div class="bucket"><div class="bhead">' + (bk.m ? '<span class="mk">' + mg(bk.m) + '</span>' : '')
    + bk.name + '</div><div class="bbody"></div></div>').join('');
  return sheet(head(no, en, th) + instruct(1,'Sort the words', intrTh)
    + b + '<div class="buckets" style="grid-template-columns:repeat(' + cols + ',1fr)">' + cells + '</div>'
    + EXTRA + foot());
}

/* === 8 · which mark completes the word? === */
function chooseMarkSheet(no, en, th, items){
  const body = items.map(it =>
    '<div class="ch-item">' + (it.e ? '<span class="emoji">' + art(it.e) + '</span>' : '')
    + '<span class="base">' + it.base + '</span>'
    + '<span class="meaning">' + it.meaning + '</span>'
    + '<div class="ch-opts">' + it.opts.map(o => '<span class="optm">' + mg(o) + '</span>').join('') + '</div>'
    + '<span class="wbox"></span></div>').join('');
  return sheet(head(no, en, th)
    + instruct(1,'Choose the tone mark','ดูภาพ/ความหมาย วงกลมรูปวรรณยุกต์ที่ถูก แล้วเขียนคำเต็มในกรอบ')
    + '<div class="choose">' + body + '</div>' + EXTRA + foot());
}

/* === ladders (ผันวรรณยุกต์) === */
function ladderSheet(no, en, th, classTh, note, cols, rows){
  const grid = '90px repeat(' + cols.length + ',1fr)';
  const headerCols = cols.map(c =>
    '<div class="lcell" style="background:var(--leaf-l);border-color:var(--line)"><span class="lt">เสียง<b>' + c.t + '</b></span>'
    + '<span class="lt">' + (c.m ? 'รูป ' + mg(c.m) : 'ไม่มีรูป') + '</span></div>').join('');
  const body = rows.map(r => {
    const cells = cols.map((c,i) =>
      '<div class="lcell"><span class="lt">' + r.lead + (c.m ? mg(c.m) : '') + '</span>'
      + (i === 0 ? '<div class="lbox">' + r.base + '</div>' : '<div class="lbox"></div>') + '</div>').join('');
    return '<div class="lad" style="grid-template-columns:' + grid + '">'
      + '<div class="lead"><span class="lm">' + r.lead + '</span><span class="lc">' + r.cls + '</span></div>'
      + cells + '</div>';
  }).join('');
  return sheet(head(no, en, th)
    + instruct(1,'Build the tone ladder','ผันวรรณยุกต์ — เขียนคำให้ครบทุกเสียง (ช่องแรกเป็นตัวอย่าง)')
    + '<div class="note-th">' + note + '</div>'
    + '<div class="lad" style="grid-template-columns:' + grid + '"><div></div>' + headerCols + '</div>'
    + '<div class="ladder">' + body + '</div>' + EXTRA + foot());
}

/* === 15 · minimal pairs (tone changes meaning) === */
function textMatchSheet(no, en, th, intrTh, pairs){
  const left = pairs.map(p => '<div class="mitem"><span>' + p.w + '</span><span class="node nR"></span></div>').join('');
  const order = pairs.map((_,i,a)=>a[(i+2)%a.length]);
  const right = order.map(p => '<div class="mitem"><span class="node nL"></span><span>' + p.m + '</span></div>').join('');
  return sheet(head(no, en, th)
    + instruct(1,'Match the meaning', intrTh)
    + '<div class="note-th">วรรณยุกต์เปลี่ยน ความหมายเปลี่ยน — อ่านให้ชัดแล้วลากเส้นจับคู่</div>'
    + '<div class="match"><div class="mcol left">' + left + '</div><div class="mcol right">' + right + '</div></div>'
    + EXTRA + foot());
}
