<style>
  .setname{font-size:.62em;font-weight:700;color:var(--earth-d);}
  #game .card{position:relative;}
  .ins{text-align:center;}
  .timebar{height:12px;border-radius:999px;background:var(--earth-l);overflow:hidden;margin:6px 0 12px;}
  .timebar>i{display:block;height:100%;width:100%;background:var(--earth);border-radius:999px;}
  .timebar>i.run{transition:width var(--td,3s) linear;width:0;}
  .timebar>i.low{background:var(--clay);}
  .btn img{width:22px;height:22px;object-fit:contain;vertical-align:-5px;margin-right:5px;}

  /* ---- picture stage (slides in each round) ---- */
  .stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:150px;margin:2px 0;}
  .stage.in{animation:slidein .42s cubic-bezier(.2,.8,.3,1);}
  @keyframes slidein{from{opacity:0;transform:translateX(46px)}to{opacity:1;transform:none}}
  .doodle svg{width:122px;height:98px;display:block;}
  .word{font-family:var(--thai);font-weight:800;font-size:62px;line-height:1.05;color:var(--ink);letter-spacing:1px;}
  .word.full{color:var(--leaf-d);animation:popword .4s ease-out;}
  @keyframes popword{from{transform:scale(.7);opacity:.3}to{transform:scale(1);opacity:1}}

  /* ---- floating balloons ---- */
  .sky{position:relative;height:232px;margin:2px 0 6px;}
  .balloon{position:absolute;bottom:6px;width:92px;border:none;background:transparent;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent;
    display:flex;flex-direction:column;align-items:center;animation:bob var(--d,3.4s) ease-in-out var(--del,0s) infinite alternate;}
  .balloon .body{width:80px;height:96px;border-radius:50% 50% 49% 49%/56% 56% 44% 44%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;position:relative;box-shadow:inset -9px -12px 0 rgba(0,0,0,.10);}
  .balloon .body::before{content:"";position:absolute;top:14px;left:16px;width:14px;height:20px;border-radius:50%;background:rgba(255,255,255,.42);transform:rotate(-18deg);}
  .balloon .body::after{content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:10px solid var(--bc,#444);}
  .balloon .string{width:2px;height:30px;background:rgba(60,48,28,.4);}
  .balloon .mk{display:flex;align-items:center;justify-content:center;height:0;line-height:0;}
  .balloon .mk b{display:inline-block;font-family:var(--thai);font-weight:800;font-size:88px;transform:translateY(50px);}
  .balloon.pop{animation:pop .42s ease-out forwards;}
  @keyframes pop{0%{transform:scale(1)}38%{transform:scale(1.38)}100%{transform:scale(1.7);opacity:0}}
  .balloon.miss{animation:shake .42s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .balloon.dim{opacity:.3;filter:grayscale(.45);transition:opacity .3s,filter .3s;}
  @keyframes bob{from{transform:translateY(8px)}to{transform:translateY(-18px)}}
  @media(max-width:520px){ .word{font-size:50px;} .doodle svg{width:104px;height:84px;} .sky{height:210px;} .balloon{width:82px;} .balloon .body{width:72px;height:88px;} .balloon .mk b{font-size:74px;transform:translateY(44px);} }

  .fs-back{display:none;position:absolute;top:14px;left:14px;z-index:6;border:2px solid var(--line-2);background:var(--surface);
    color:var(--ink-2);font-family:var(--thai);font-weight:800;border-radius:999px;padding:9px 18px;font-size:1rem;cursor:pointer;}
  #game .card:fullscreen{display:flex;flex-direction:column;justify-content:center;background:var(--bg);padding:30px;}
  #game .card:fullscreen .fs-back{display:block;}
  .qr-corner{position:absolute;right:12px;bottom:12px;z-index:5;display:flex;flex-direction:column;align-items:center;gap:1px;
    cursor:pointer;background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:6px;box-shadow:0 1px 5px rgba(60,48,28,.12);}
  .qr-corner #qrSmall canvas,.qr-corner #qrSmall img{display:block;width:54px;height:54px;}
  .qr-corner span{font-family:var(--thai);font-size:.66rem;color:var(--ink-3);font-weight:700;line-height:1;}
  .qr-pop{display:none;position:absolute;inset:0;z-index:20;background:rgba(40,32,20,.55);align-items:center;justify-content:center;padding:16px;}
  .qr-pop.show{display:flex;}
  .qr-pop-inner{background:#fff;border-radius:22px;padding:26px 24px;text-align:center;max-width:90%;}
  .qr-pop-inner h3{font-family:var(--thai);margin:0 0 4px;color:var(--ink);font-size:1.15rem;}
  .qr-pop-inner #qrBig canvas,.qr-pop-inner #qrBig img{display:block;width:236px;height:236px;margin:14px auto 0;}
  .qr-url{font-family:var(--font);font-size:.82rem;color:var(--ink-2);margin:12px 0 16px;word-break:break-all;}
  .qr-acts{display:flex;gap:10px;justify-content:center;}
  .qr-acts button{border:none;border-radius:11px;font-family:var(--thai);font-weight:800;font-size:.95rem;padding:11px 20px;cursor:pointer;color:#fff;background:var(--leaf);box-shadow:inset 0 -3px 0 rgba(0,0,0,.13);}
  .qr-acts button.ghost{background:var(--surface);color:var(--ink-2);border:1.6px solid var(--line-2);box-shadow:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="logo">P</span>
    <div><div class="bn">PANYA</div><div class="bs">Y2 · เกมวรรณยุกต์</div></div>
    <span class="spacer"></span><a class="home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก</a>

  <h1>เติมวรรณยุกต์ <span class="setname">· ลูกโป่งวรรณยุกต์</span></h1>

    </div>
  </div>

  <div class="card done" id="done" style="display:none">
    <div class="big">🎉</div><h2 id="dt"></h2><p class="sub" id="ds"></p>
    <div class="actions"><button class="btn check" id="again">เล่นอีกครั้ง</button></div>
  </div>
</div>

<script>
// Y2 Unit 2 — Tone-mark balloons: pick the mark that completes the pictured word
// kid pencil-doodle pictures (wobbly black stroke, white fill)
const S='<svg viewBox="0 0 100 92" fill="none" stroke="#2f2a20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">';
const ELEPHANT=S+'<ellipse cx="50" cy="46" rx="22" ry="20" fill="#fff"/><path d="M30 36 q-12 -2 -12 10 q0 10 12 8 z" fill="#fff"/><path d="M70 36 q12 -2 12 10 q0 10 -12 8 z" fill="#fff"/><path d="M50 62 q-4 12 2 18 q4 4 7 -1 q2 -4 -2 -6" fill="#fff"/><path d="M44 60 q-3 6 0 11"/><path d="M56 60 q3 6 0 11"/><circle cx="42" cy="44" r="2" fill="#2f2a20" stroke="none"/><circle cx="58" cy="44" r="2" fill="#2f2a20" stroke="none"/></svg>';
const CHICK=S+'<circle cx="46" cy="54" r="20" fill="#fff"/><circle cx="64" cy="36" r="12" fill="#fff"/><path d="M64 24 q1 -6 6 -6 q1 5 -4 7" fill="#fff"/><path d="M75 35 l9 -1 l-8 5 z" fill="#fff"/><circle cx="67" cy="34" r="1.7" fill="#2f2a20" stroke="none"/><path d="M30 56 q-9 1 -6 10"/><path d="M42 74 v7"/><path d="M52 74 v7"/></svg>';
const ORANGE=S+'<circle cx="50" cy="52" r="25" fill="#fff"/><path d="M50 27 q1 -7 9 -9"/><path d="M53 20 q11 -5 17 1 q-9 5 -17 -1 z" fill="#fff"/></svg>';
const TREE=S+'<path d="M44 80 v-26 h12 v26" fill="#fff"/><path d="M50 12 q-20 1 -21 18 q-10 4 -5 15 q4 8 15 6 q6 9 19 3 q14 1 16 -11 q9 -8 1 -18 q-1 -15 -25 -13 z" fill="#fff"/></svg>';
const UMBRELLA=S+'<path d="M50 24 V72 q0 8 8 8"/><path d="M16 46 q34 -36 68 0 q-11 -7 -17 0 q-12 -8 -17 0 q-12 -8 -17 0 q-6 -5 -17 0 z" fill="#fff"/><path d="M50 24 v-5"/></svg>';
const SHIRT=S+'<path d="M36 24 L24 36 l9 9 l5 -5 V76 h26 V40 l5 5 l9 -9 l-12 -12 q-7 7 -16 7 q-9 0 -15 -7 z" fill="#fff"/></svg>';
const DROP=S+'<path d="M50 16 q19 26 19 38 a19 19 0 0 1 -38 0 q0 -12 19 -38 z" fill="#fff"/><path d="M40 52 q1 9 9 11"/></svg>';
const FLUTE=S+'<path d="M18 42 h58 q9 0 9 7 q0 7 -9 7 h-58 q-7 0 -7 -7 q0 -7 7 -7 z" fill="#fff"/><path d="M85 41 q7 8 0 16"/><circle cx="34" cy="49" r="1.7" fill="#2f2a20" stroke="none"/><circle cx="45" cy="49" r="1.7" fill="#2f2a20" stroke="none"/><circle cx="56" cy="49" r="1.7" fill="#2f2a20" stroke="none"/><circle cx="67" cy="49" r="1.7" fill="#2f2a20" stroke="none"/></svg>';
const EGG=S+'<ellipse cx="50" cy="52" rx="21" ry="27" fill="#fff"/><path d="M40 46 q2 9 9 12"/></svg>';
const BASIN=S+'<ellipse cx="50" cy="42" rx="28" ry="9" fill="#fff"/><path d="M23 42 l5 28 q1 6 22 6 q21 0 22 -6 l5 -28" fill="#fff"/><path d="M41 50 q1 9 5 15"/></svg>';
const BOX=S+'<path d="M26 40 l12 -10 h40 l-12 10 z" fill="#fff"/><path d="M26 40 v32 h40 v-32 z" fill="#fff"/><path d="M66 40 l12 -10 v32 l-12 10 z" fill="#fff"/><path d="M26 54 h40"/></svg>';
const NOODLE=S+'<path d="M24 48 q26 8 52 0 l-6 20 q-1 6 -20 6 q-19 0 -20 -6 z" fill="#fff"/><path d="M30 46 q4 -12 20 -11 q16 -1 20 11" fill="#fff"/><path d="M36 44 q3 -8 11 -8 M46 44 q3 -8 11 -8"/><path d="M56 30 l18 -11 M60 33 l18 -11"/></svg>';
const GRANDPA=S+'<circle cx="50" cy="48" r="23" fill="#fff"/><path d="M30 38 q20 -13 40 0"/><circle cx="41" cy="46" r="5" fill="#fff"/><circle cx="59" cy="46" r="5" fill="#fff"/><path d="M46 46 h8"/><path d="M40 58 q-5 5 -9 2 M60 58 q5 5 9 2"/><path d="M42 60 q8 5 16 0"/></svg>';
const DAD=S+'<circle cx="50" cy="50" r="22" fill="#fff"/><path d="M29 44 q3 -20 21 -20 q18 0 21 20 q-10 -8 -21 -8 q-11 0 -21 8 z" fill="#fff"/><circle cx="42" cy="48" r="2" fill="#2f2a20" stroke="none"/><circle cx="58" cy="48" r="2" fill="#2f2a20" stroke="none"/><path d="M43 60 q7 5 14 0"/></svg>';
const MOM=S+'<circle cx="50" cy="50" r="21" fill="#fff"/><path d="M29 54 q-5 -32 21 -32 q26 0 21 32 q3 -17 -7 -17 q-4 9 -14 9 q-10 0 -14 -9 q-10 0 -7 17 z" fill="#fff"/><circle cx="42" cy="50" r="2" fill="#2f2a20" stroke="none"/><circle cx="58" cy="50" r="2" fill="#2f2a20" stroke="none"/><path d="M43 60 q7 5 14 0"/></svg>';
const HORSE=S+'<path d="M28 74 V52 M44 76 V54 M58 76 V54 M74 72 V52"/><ellipse cx="50" cy="48" rx="26" ry="14" fill="#fff"/><path d="M72 46 q14 -2 16 -18 q1 -8 -6 -10 q-4 8 -12 10 q-8 2 -8 14" fill="#fff"/><path d="M70 18 q-6 4 -4 14"/><path d="M24 44 q-11 0 -10 13"/><circle cx="80" cy="22" r="1.8" fill="#2f2a20" stroke="none"/></svg>';
const HOUSE=S+'<path d="M22 46 L50 22 L78 46" fill="#fff"/><path d="M30 46 V74 h40 V46" fill="#fff"/><path d="M44 74 V58 h12 v16" fill="#fff"/><rect x="34" y="50" width="9" height="9" fill="#fff"/></svg>';
const GLASS=S+'<path d="M34 26 h32 l-4 46 q-1 4 -12 4 q-11 0 -12 -4 z" fill="#fff"/><path d="M36 40 h28"/></svg>';
const RICE=S+'<path d="M24 50 q26 8 52 0 l-6 18 q-1 6 -20 6 q-19 0 -20 -6 z" fill="#fff"/><path d="M27 50 q3 -14 23 -14 q20 0 23 14" fill="#fff"/><path d="M44 30 q-4 -6 0 -12 M55 30 q4 -6 0 -12"/></svg>';
const CABINET=S+'<rect x="33" y="18" width="34" height="58" rx="3" fill="#fff"/><path d="M50 18 V76"/><path d="M44 40 v9 M56 40 v9"/></svg>';
const TABLE=S+'<rect x="22" y="36" width="56" height="9" rx="2" fill="#fff"/><path d="M30 45 V72 M70 45 V72"/></svg>';
const DOLL=S+'<circle cx="50" cy="34" r="14" fill="#fff"/><circle cx="39" cy="24" r="6" fill="#fff"/><circle cx="61" cy="24" r="6" fill="#fff"/><circle cx="45" cy="33" r="1.6" fill="#2f2a20" stroke="none"/><circle cx="55" cy="33" r="1.6" fill="#2f2a20" stroke="none"/><circle cx="50" cy="38" r="2" fill="#2f2a20" stroke="none"/><path d="M37 52 q13 11 26 0 l4 20 q-17 7 -34 0 z" fill="#fff"/><path d="M37 56 q-6 4 -5 13 M63 56 q6 4 5 13"/></svg>';
const FAUCET=S+'<path d="M24 44 c0 -22 32 -22 32 0" fill="none" stroke-width="6"/><path d="M56 44 v7" stroke-width="6"/><rect x="18" y="44" width="14" height="10" rx="2" fill="#fff"/><path d="M52 53 l4 7 l4 -7 z" fill="#fff"/></svg>';
const CAR=S+'<path d="M18 58 q2 -13 14 -13 q6 -11 18 -11 q13 0 18 11 q12 0 14 13" fill="#fff"/><path d="M18 58 h64 v6 h-64 z" fill="#fff"/><circle cx="34" cy="64" r="6" fill="#fff"/><circle cx="66" cy="64" r="6" fill="#fff"/><path d="M37 46 h26"/></svg>';
const TICKET=S+'<rect x="20" y="34" width="60" height="28" rx="4" fill="#fff"/><path d="M50 36 V60" stroke-dasharray="3 4"/><path d="M28 44 h13 M28 52 h13"/></svg>';
const MONKEY=S+'<circle cx="50" cy="48" r="22" fill="#fff"/><circle cx="28" cy="42" r="9" fill="#fff"/><circle cx="72" cy="42" r="9" fill="#fff"/><path d="M50 42 q-14 0 -14 14 q0 12 14 12 q14 0 14 -12 q0 -14 -14 -14 z" fill="#fff"/><circle cx="43" cy="44" r="2" fill="#2f2a20" stroke="none"/><circle cx="57" cy="44" r="2" fill="#2f2a20" stroke="none"/><circle cx="46" cy="57" r="1.5" fill="#2f2a20" stroke="none"/><circle cx="54" cy="57" r="1.5" fill="#2f2a20" stroke="none"/><path d="M46 62 q4 3 8 0"/></svg>';

// the written tone marks (◌ shows the mark on a placeholder)
const MARKS=[
  {id:"ek", mark:"่", name:"ไม้เอก"},
  {id:"to", mark:"้", name:"ไม้โท"},
  {id:"tr", mark:"๊", name:"ไม้ตรี"},
  {id:"ja", mark:"๋", name:"ไม้จัตวา"},
];
// word = full spelling · base = without the tone mark · m = correct mark id · d = doodle
const WORDS=[
  // ไม้เอก ◌่
  {w:"ไก่",    base:"ไก",    m:"ek", d:CHICK},
  {w:"ไข่",    base:"ไข",    m:"ek", d:EGG},
  {w:"ร่ม",    base:"รม",    m:"ek", d:UMBRELLA},
  {w:"ปี่",    base:"ปี",    m:"ek", d:FLUTE},
  {w:"อ่าง",   base:"อาง",   m:"ek", d:BASIN},
  {w:"กล่อง",  base:"กลอง",  m:"ek", d:BOX},
  {w:"หมี่",   base:"หมี",   m:"ek", d:NOODLE},
  {w:"ปู่",    base:"ปู",    m:"ek", d:GRANDPA},
  {w:"พ่อ",    base:"พอ",    m:"ek", d:DAD},
  {w:"แม่",    base:"แม",    m:"ek", d:MOM},
  // ไม้โท ◌้
  {w:"ช้าง",   base:"ชาง",   m:"to", d:ELEPHANT},
  {w:"ส้ม",    base:"สม",    m:"to", d:ORANGE},
  {w:"ไม้",    base:"ไม",    m:"to", d:TREE},
  {w:"เสื้อ",  base:"เสือ",  m:"to", d:SHIRT},
  {w:"น้ำ",    base:"นำ",    m:"to", d:DROP},
  {w:"ม้า",    base:"มา",    m:"to", d:HORSE},
  {w:"บ้าน",   base:"บาน",   m:"to", d:HOUSE},
  {w:"แก้ว",   base:"แกว",   m:"to", d:GLASS},
  {w:"ข้าว",   base:"ขาว",   m:"to", d:RICE},
  {w:"ตู้",    base:"ตู",    m:"to", d:CABINET},
  // ไม้ตรี ◌๊
  {w:"โต๊ะ",   base:"โตะ",   m:"tr", d:TABLE},
  {w:"ตุ๊กตา", base:"ตุกตา", m:"tr", d:DOLL},
  {w:"ก๊อก",   base:"กอก",   m:"tr", d:FAUCET},
  // ไม้จัตวา ◌๋
  {w:"เก๋ง",   base:"เกง",   m:"ja", d:CAR},
  {w:"ตั๋ว",   base:"ตัว",   m:"ja", d:TICKET},
  {w:"จ๋อ",    base:"จอ",    m:"ja", d:MONKEY},
];
const COLORS=["#d9694a","#5b8c6e","#e0a93f","#5f86a8"];
const ROUNDS=12;   // play a random 12-word subset of the pool each game
const TIMER=6000;   // 6 seconds per word

const $=id=>document.getElementById(id);
let queue=[], i=0, score=0, locked=false, cur=null, timer=null, lowTimer=null;
const card=()=>$("game").querySelector(".card");
function shuffle(a){ for(let k=a.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); const t=a[k]; a[k]=a[j]; a[j]=t; } return a; }
// play the recorded teacher clip if present (audio/words/<word>.mp3), else fall back to TTS
function readQ(){ if(cur) GameFX.play("audio/words/"+cur.w+".mp3", cur.w); }

function startTimer(){
  const t=$("timeFill"); t.style.setProperty("--td",TIMER+"ms"); t.classList.remove("run","low"); t.style.width="100%"; void t.offsetWidth;
  requestAnimationFrame(()=>{ t.classList.add("run"); t.style.width="0%"; });
  clearTimeout(timer); timer=setTimeout(timeUp, TIMER);
  clearTimeout(lowTimer); lowTimer=setTimeout(()=>t.classList.add("low"), TIMER*0.6);
}
function stopTimer(){ clearTimeout(timer); clearTimeout(lowTimer); const t=$("timeFill"); t.classList.remove("run"); t.style.width=getComputedStyle(t).width; }

// isolated tone marks are drawn to the LEFT of the text origin, so measure each
// glyph's ink box (font Mali) and shift it back to dead-centre — values in em so
// they scale with the balloon's font-size on any screen
const MSHIFT={ek:{x:0.14,y:0.34}, to:{x:0.22,y:0.34}, tr:{x:0.25,y:0.34}, ja:{x:0.145,y:0.34}};
let _mctx;
function computeShifts(){ try{ if(!_mctx) _mctx=document.createElement("canvas").getContext("2d");
  _mctx.font='800 100px "Mali"'; _mctx.textAlign="left"; _mctx.textBaseline="alphabetic";
  MARKS.forEach(m=>{ const me=_mctx.measureText(m.mark);
    const x=-((me.actualBoundingBoxRight-me.actualBoundingBoxLeft)/2)/100;
    const y=((me.actualBoundingBoxAscent-me.actualBoundingBoxDescent)/2)/100;
    if(isFinite(x)&&isFinite(y)) MSHIFT[m.id]={x:x,y:y}; }); }catch(e){} }
computeShifts();
try{ if(document.fonts&&document.fonts.ready) document.fonts.ready.then(computeShifts); }catch(e){}

function spawnBalloons(){
  const sky=$("sky"); sky.innerHTML="";
  const order=shuffle(MARKS.slice());
  const lefts=[3,28,53,77];
  order.forEach((m,k)=>{
    const b=document.createElement("button"); b.className="balloon"; b.dataset.id=m.id;
    b.style.left=lefts[k]+"%";
    b.style.setProperty("--d",(3+Math.random()*1.7).toFixed(2)+"s");
    b.style.setProperty("--del",(Math.random()*1.3).toFixed(2)+"s");
    const col=COLORS[k%COLORS.length];
    b.innerHTML='<div class="body" style="background:'+col+';--bc:'+col+'"><div class="mk"><b>'+m.mark+'</b></div></div><div class="string"></div>';
    const sh=MSHIFT[m.id]||{x:0}; b.querySelector(".mk b").style.transform="translate("+sh.x.toFixed(3)+"em,0.74em)";
    b.onclick=()=>pick(b,m);
    sky.appendChild(b);
  });
}
function highlightCorrect(){
  let cb=null;
  [...$("sky").children].forEach(x=>{ x.disabled=true; if(x.dataset.id===cur.m){cb=x;} else x.classList.add("dim"); });
  if(cb){ cb.classList.remove("dim"); cb.classList.add("pop"); }
  $("q").textContent=cur.w; $("q").className="word full";
}
function setProg(){ $("prog").innerHTML="ข้อ <b>"+(i+1)+"</b> / "+ROUNDS+" · คะแนน "+score; }

function start(){ queue=shuffle(WORDS.slice()).slice(0,ROUNDS); i=0; score=0; $("done").style.display="none"; $("game").style.display=""; load(); }
function load(){
  locked=false; cur=queue[i];
  const stage=$("stage"); stage.classList.remove("in"); void stage.offsetWidth; stage.classList.add("in");
  $("doodle").innerHTML=cur.d;
  $("q").textContent=cur.base; $("q").className="word";
  spawnBalloons();
  $("fb").textContent=""; $("fb").className="feedback";
  setProg();
  setTimeout(readQ,320); startTimer();
}
function pick(b,m){
  if(locked) return;
  if(m.id===cur.m){
    locked=true; stopTimer(); score++;
    highlightCorrect();
    $("fb").textContent="ถูกต้อง! "+cur.w+" 🎉"; $("fb").className="feedback good";
    GameFX.correct(); GameFX.pop(card(),true); GameFX.confetti($("sky"));
    setProg(); setTimeout(readQ,430); setTimeout(next,1550);
  } else {
    b.disabled=true; b.classList.add("miss");
    setTimeout(()=>{ b.classList.remove("miss"); b.classList.add("dim"); },420);
    GameFX.wrong(); GameFX.pop(card(),false);
  }
}
function timeUp(){
  if(locked) return; locked=true;
  highlightCorrect();
  $("fb").textContent="หมดเวลา! คำนี้คือ "+cur.w; $("fb").className="feedback bad";
  GameFX.wrong(); setTimeout(readQ,430); setTimeout(next,1700);
}
function next(){ i++; if(i>=ROUNDS) finish(); else load(); }
function finish(){
  stopTimer();
  $("game").style.display="none"; $("done").style.display="";
  $("dt").textContent="ได้ "+score+" / "+ROUNDS+" คะแนน";
  $("ds").textContent = score===ROUNDS?"เก่งมาก! เติมวรรณยุกต์ได้ครบทุกข้อ 👑" : score>=Math.ceil(ROUNDS*0.7)?"เยี่ยม! เกือบเต็มแล้ว" : "ฝึกอีกนิดนะ แล้วจะเก่งขึ้น";
  GameFX.celebrate(); GameFX.confetti($("done"));
}
$("readBtn").onclick=readQ;
$("again").onclick=start;

/* fullscreen + share QR */
$("fsBtn").onclick=()=>{ const el=$("game").querySelector(".card"); try{ if(!document.fullscreenElement){(el.requestFullscreen||el.webkitRequestFullscreen).call(el);}else document.exitFullscreen(); }catch(e){} };
$("fsBack").onclick=()=>{ try{ document.exitFullscreen(); }catch(e){} };
const BOARD_URL="https://iamteacherta-code.github.io/panya-thai/interactive-tone-mark.html";
function makeQR(el,size){ if(!window.QRCode||!el)return; el.innerHTML=""; try{ new QRCode(el,{text:BOARD_URL,width:size,height:size,colorDark:"#2f2a20",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M}); }catch(e){} }
makeQR($("qrSmall"),54);
$("qrCorner").onclick=()=>{ makeQR($("qrBig"),236); $("qrUrl").textContent=BOARD_URL; $("qrPop").classList.add("show"); };
$("qrClose").onclick=()=>$("qrPop").classList.remove("show");
$("qrPop").onclick=e=>{ if(e.target===$("qrPop")) $("qrPop").classList.remove("show"); };
$("qrCopy").onclick=async()=>{ try{ await navigator.clipboard.writeText(BOARD_URL); $("qrCopy").textContent="✓ คัดลอกแล้ว"; setTimeout(()=>$("qrCopy").textContent="คัดลอกลิงก์",1500);}catch(e){ $("qrCopy").textContent=BOARD_URL; } };
if(!window.QRCode && $("qrCorner")) $("qrCorner").style.display="none";
start();
</script>
