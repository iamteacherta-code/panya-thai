<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PANYA · Word Map · จัดกลุ่มคำ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="interactive.css" />
<style>
  .bankzone{display:flex;flex-wrap:wrap;gap:9px;min-height:60px;border:2px dashed var(--line-2);border-radius:14px;background:#fff;padding:12px;margin:6px 0 16px;}
  .branches{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
  .branch{border:1.7px solid var(--line);border-radius:14px;background:var(--surface);padding:10px;min-height:130px;cursor:pointer;}
  .branch.aim{outline:3px solid rgba(91,122,75,.35);}
  .branch .bh{font-family:var(--thai);font-weight:700;color:var(--earth-d);font-size:.95rem;border-bottom:1.5px solid var(--line);padding-bottom:6px;margin-bottom:8px;text-align:center;}
  .branch .drop{display:flex;flex-wrap:wrap;gap:8px;}
  .w.small{font-size:1.2rem;padding:7px 12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="logo">P</span>
    <div><div class="bn">PANYA</div><div class="bs">Word Map · จัดกลุ่มคำ</div></div>
    <span class="spacer"></span><a class="home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก</a>
  </div>
  <div class="eyebrow">Interactive · จัดกลุ่มตามมาตราตัวสะกด</div>
  <h1>ลากคำเข้ากิ่งให้ถูกมาตรา</h1>
  <p class="sub">แตะคำในกล่อง แล้วแตะกิ่งที่ถูกต้อง · แตะคำในกิ่งเพื่อเอาออก แล้วกด “ตรวจ”</p>
  <div class="bar"><div class="prog" id="prog"></div></div>

  <div id="game">
    <div class="card">
      <div class="bankzone" id="bank"></div>
      <div class="branches" id="branches"></div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn check" id="checkBtn">✓ ตรวจ</button>
        <button class="btn ghost" id="resetBtn">เริ่มชุดนี้ใหม่</button>
        <button class="btn next" id="nextBtn" disabled>ชุดต่อไป →</button>
      </div>
    </div>
  </div>
  <div class="card done" id="done" style="display:none">
    <div class="big">🗺️</div><h2 id="dt"></h2><p class="sub" id="ds"></p>
    <div class="actions"><button class="btn check" id="again">เล่นอีกครั้ง</button></div>
  </div>
</div>

<script>
const BR={
  kong:{id:"kong",name:"แม่กง (–ง)"}, kon:{id:"kon",name:"แม่กน (–น)"},
  kom:{id:"kom",name:"แม่กม (–ม)"},   koei:{id:"koei",name:"แม่เกย (–ย)"},
  keow:{id:"keow",name:"แม่เกอว (–ว)"}, kok:{id:"kok",name:"แม่กก (–ก)"},
  kot:{id:"kot",name:"แม่กด (–ด)"},   kop:{id:"kop",name:"แม่กบ (–บ)"},
};
const mkSet=(ids,pairs)=>({ branches:ids.map(i=>BR[i]), words:pairs.flatMap(([c,ws])=>ws.map(w=>({w,c}))) });
const SETS = [
  // ชุด 1
  mkSet(["kong","kon","kom","koei"],[["kong",["ลิง","ทอง","กาง"]],["kon",["จาน","ปีน","กิน"]],["kom",["ตาม","ลม"]],["koei",["สาย","โรย"]]]),
  // ชุด 2
  mkSet(["kok","kot","kop","keow"],[["kok",["ปาก","นก","มาก"]],["kot",["ปิด","มืด","รด"]],["kop",["จับ","ดิบ"]],["keow",["ดาว","แมว"]]]),
  // ชุด 3
  mkSet(["kong","kon","kok","kot"],[["kong",["ฟัง","แรง"]],["kon",["นอน","บาน","วาน"]],["kok",["สุก","จาก"]],["kot",["บาด","หมด","พูด"]]]),
  // ชุด 4
  mkSet(["kom","koei","keow","kop"],[["kom",["ชิม","ยาม","ถาม"]],["koei",["ขาย","ยาย"]],["keow",["หิว","เร็ว"]],["kop",["ตอบ","ลูบ","พบ"]]]),
  // ชุด 5
  mkSet(["kong","kom","kok","kop"],[["kong",["ของ","ยุง","ปลิง"]],["kom",["นม","ริม"]],["kok",["ลูก","รัก"]],["kop",["คับ","ทับ","รับ"]]]),
  // ชุด 6
  mkSet(["kon","kot","koei","keow"],[["kon",["คน","ฝน","ดิน"]],["kot",["จืด","เปิด"]],["koei",["ลอย","ควาย"]],["keow",["แล้ว","ขาว","เลว"]]]),
  // ชุด 7
  mkSet(["kong","kon","kom","kok"],[["kong",["สอง","สิง"]],["kon",["หิน","คาน","ขน"]],["kom",["ดม","สนาม"]],["kok",["ปลูก","ฉีก","ตึก"]]]),
  // ชุด 8
  mkSet(["kot","kop","koei","keow"],[["kot",["ขูด","มด","ชุด"]],["kop",["สูบ","กราบ"]],["koei",["สวย","ดอย"]],["keow",["สาว","ทิว","เคียว"]]]),
  // ชุด 9
  mkSet(["kong","kom","kot","kop"],[["kong",["ลง","ดัง"]],["kom",["ลืม","ส้ม","ตุ่ม"]],["kot",["ตลาด","สะอาด"]],["kop",["จีบ","หลับ","กราบ"]]]),
  // ชุด 10
  mkSet(["kok","kot","koei","keow"],[["kok",["ลาก","เลข","หมึก"]],["kot",["ราด","ขีด"]],["koei",["ป้าย","ตาย","โปรย"]],["keow",["กาว","นิ้ว"]]]),
];
const $=id=>document.getElementById(id);
const shuffle=a=>{a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]];}return a;};
let r=0, place={}, sel=null, solved=false; // place[word]=branchId
const SET=()=>SETS[r];

function render(){
  const set=SET(), placedWords=Object.keys(place);
  // bank
  $("bank").innerHTML="";
  shuffle(set.words.map(x=>x.w)).filter(w=>!placedWords.includes(w)).forEach(w=>{
    const b=mk(w,()=>{ if(solved)return; sel=(sel===w?null:w); paint(); });
    $("bank").appendChild(b);
  });
  // branches
  $("branches").innerHTML="";
  set.branches.forEach(br=>{
    const d=document.createElement("div"); d.className="branch"; d.dataset.id=br.id;
    d.innerHTML='<div class="bh">'+br.name+'</div>';
    const drop=document.createElement("div"); drop.className="drop";
    placedWords.filter(w=>place[w]===br.id).forEach(w=>{ const b=mk(w,()=>{ if(solved)return; delete place[w]; sel=null; render(); }); drop.appendChild(b); });
    d.appendChild(drop);
    d.onclick=(e)=>{ if(solved||e.target.classList.contains("w"))return; if(sel){ place[sel]=br.id; sel=null; render(); } };
    $("branches").appendChild(d);
  });
  paint();
  $("prog").innerHTML="ชุด <b>"+(r+1)+"</b> / "+SETS.length+" · วางแล้ว "+placedWords.length+" / "+set.words.length;
}
function mk(w,fn){ const b=document.createElement("button"); b.className="w small"; b.textContent=w; b.onclick=(e)=>{e.stopPropagation();fn();}; return b; }
function paint(){ [...$("bank").children].forEach(c=>c.classList.toggle("sel",c.textContent===sel)); [...document.querySelectorAll(".branch")].forEach(b=>b.classList.toggle("aim",!!sel&&!solved)); }

$("checkBtn").onclick=()=>{
  const set=SET(), placed=Object.keys(place);
  if(placed.length<set.words.length){ $("feedback").textContent="วางให้ครบทุกคำก่อนนะ"; $("feedback").className="feedback bad"; return; }
  let correct=0; set.words.forEach(x=>{ if(place[x.w]===x.c) correct++; });
  document.querySelectorAll(".branch").forEach(br=>{ [...br.querySelectorAll(".w")].forEach(el=>{ const ok=set.words.find(x=>x.w===el.textContent).c===br.dataset.id; el.classList.add(ok?"right":"wrong"); }); });
  if(correct===set.words.length){
    $("feedback").textContent="✓ ถูกทั้งหมด เก่งมาก! 🎉"; $("feedback").className="feedback good";
    solved=true; $("checkBtn").disabled=true; $("nextBtn").disabled=false;
    $("nextBtn").textContent = r<SETS.length-1 ? "ชุดต่อไป →" : "ดูสรุป";
  } else { $("feedback").textContent="ถูก "+correct+" / "+set.words.length+" — คำสีแดงอยู่ผิดกิ่ง แตะออกแล้วย้ายใหม่"; $("feedback").className="feedback bad"; }
};
$("resetBtn").onclick=()=>{ place={}; sel=null; solved=false; $("checkBtn").disabled=false; $("nextBtn").disabled=true; $("feedback").textContent=""; $("feedback").className="feedback"; render(); };
$("nextBtn").onclick=()=>{
  r++;
  if(r>=SETS.length){ $("game").style.display="none"; $("done").style.display="";
    $("dt").textContent="จัดกลุ่มครบทุกชุดแล้ว! 🎉"; $("ds").textContent="หนูจัดคำตามมาตราตัวสะกดได้ครบทั้ง 8 มาตราแล้ว"; return; }
  place={}; sel=null; solved=false; $("checkBtn").disabled=false; $("nextBtn").disabled=true; $("feedback").textContent=""; $("feedback").className="feedback"; render();
};
$("again").onclick=()=>{ r=0; place={}; sel=null; solved=false; $("done").style.display="none"; $("game").style.display=""; $("checkBtn").disabled=false; $("nextBtn").disabled=true; $("feedback").textContent=""; $("feedback").className="feedback"; render(); };
render();
</script>
</body>
</html>
