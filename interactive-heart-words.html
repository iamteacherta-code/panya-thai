<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PANYA · Heart Words · คำที่ต้องจำ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="interactive.css" />
<style>
  .word{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:14px 0 8px;}
  .part{font-family:var(--thai);font-size:2.4rem;border:1.9px solid var(--line-2);border-radius:14px;background:#fff;color:var(--ink);
    padding:8px 16px;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;}
  .part.heart{background:#fde7ea;border-color:var(--clay);color:var(--clay);}
  .part.heart::after{content:"♥";position:absolute;top:-10px;right:-6px;font-size:1rem;color:var(--clay);}
  .part.right{background:var(--leaf-l);border-color:var(--leaf);}
  .part.miss{outline:3px dashed var(--clay);}
  .part.bad{background:#fff3cd;border-color:var(--earth);}
  .meaning{text-align:center;font-family:var(--thai);color:var(--ink-3);min-height:24px;}
  .setchips{display:flex;gap:6px;flex-wrap:wrap;}
  .setchip{font-weight:800;font-size:.85rem;cursor:pointer;border:1.6px solid var(--line-2);background:#fff;color:var(--ink-3);
    border-radius:9px;width:34px;height:34px;-webkit-tap-highlight-color:transparent;}
  .setchip.on{background:var(--earth);color:#fff;border-color:transparent;}
  .lbl{font-weight:800;color:var(--ink-3);font-size:.8rem;margin-right:4px;align-self:center;}
</style>
</head>

<div class="wrap">
  <div class="top">
    <span class="logo">P</span>
    <div><div class="bn">PANYA</div><div class="bs">Heart Words · คำที่ต้องจำ</div></div>
    <span class="spacer"></span><a class="home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก</a>
  </div>
  <div class="eyebrow">Interactive · Orthographic Mapping</div>
  <h1>แตะส่วนของคำที่ “ต้องจำ”</h1>
  <p class="sub">คำเหล่านี้สะกดไม่ตรงเสียง — แตะส่วนที่ต้องจำเป็นพิเศษ (♥) แล้วกด “ตรวจ” · เลือกระดับชั้นและชุดได้</p>

  <div class="bar"><span class="lbl">ระดับชั้น</span><div class="chips" id="levels"></div></div>
  <div class="bar"><span class="lbl">ชุดที่</span><div class="setchips" id="sets"></div></div>
  <div class="bar"><div class="prog" id="prog"></div></div>

  <div id="game">
    <div class="card">
      <div class="meaning" id="meaning"></div>
      <div class="word" id="word"></div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn check" id="checkBtn">✓ ตรวจ</button>
        <button class="btn ghost" id="clearBtn">ล้าง</button>
        <button class="btn next" id="nextBtn" disabled>ถัดไป →</button>
      </div>
    </div>
  </div>

  <div class="card done" id="setdone" style="display:none">
    <div class="big">❤️</div><h2 id="sdTitle"></h2><p class="sub" id="sdSub"></p>
    <div class="actions"><button class="btn check" id="sdNext"></button></div>
  </div>
</div>

const $=id=>document.getElementById(id);
function parse(rec){ const segs=rec[0].split("|"), parts=[], heart=[];
  segs.forEach((s,i)=>{ if(s.length>1 && s[0]==="[" && s[s.length-1]==="]"){ parts.push(s.slice(1,-1)); heart.push(i); } else parts.push(s); });
  return {parts, heart, m:rec[1]}; }

const LV=["Y4","Y5","Y6"], PER=10, NSETS=10;
let level="Y4", setIdx=0, wordIdx=0, score=0, sel=new Set();
const curSet=()=>DATA[level].slice(setIdx*PER, setIdx*PER+PER).map(parse);
const curWord=()=>curSet()[wordIdx];

// level chips
LV.forEach(l=>{ const b=document.createElement("button"); b.className="lvchip"+(l===level?" on":""); b.textContent=l; b.dataset.l=l;
  b.onclick=()=>{ level=l; setIdx=0; [...$("levels").children].forEach(c=>c.classList.toggle("on",c.dataset.l===l)); buildSetChips(); startSet(); };
  $("levels").appendChild(b); });
function buildSetChips(){ $("sets").innerHTML="";
  for(let i=0;i<NSETS;i++){ const b=document.createElement("button"); b.className="setchip"+(i===setIdx?" on":""); b.textContent=i+1; b.dataset.i=i;
    b.onclick=()=>{ setIdx=i; [...$("sets").children].forEach(c=>c.classList.toggle("on",+c.dataset.i===i)); startSet(); }; $("sets").appendChild(b); } }
function syncSetChips(){ [...$("sets").children].forEach(c=>c.classList.toggle("on",+c.dataset.i===setIdx)); }

function startSet(){ wordIdx=0; score=0; $("game").style.display=""; $("setdone").style.display="none"; syncSetChips(); load(); }

function load(){
  const w=curWord(); sel=new Set();
  $("meaning").textContent=w.m;
  $("word").innerHTML="";
  w.parts.forEach((p,idx)=>{ const b=document.createElement("button"); b.className="part"; b.textContent=p; b.dataset.i=idx;
    b.onclick=()=>{ if(b.classList.contains("right")||b.classList.contains("miss")||b.classList.contains("bad"))return;
      if(sel.has(idx)){sel.delete(idx);b.classList.remove("heart");} else {sel.add(idx);b.classList.add("heart");} };
    $("word").appendChild(b); });
  $("feedback").textContent=""; $("feedback").className="feedback"; $("nextBtn").disabled=true; $("checkBtn").disabled=false;
  $("prog").innerHTML="ระดับ <b>"+level+"</b> · ชุด <b>"+(setIdx+1)+"</b>/"+NSETS+" · คำ <b>"+(wordIdx+1)+"</b>/"+PER+" · ถูก "+score;
}
$("checkBtn").onclick=()=>{
  const w=curWord(), want=new Set(w.heart);
  const ok = sel.size===want.size && [...want].every(x=>sel.has(x));
  [...$("word").children].forEach((el,idx)=>{
    if(want.has(idx)) el.classList.add(sel.has(idx)?"right":"miss");
    else if(sel.has(idx)) el.classList.add("bad");
  });
  if(ok){ $("feedback").textContent="✓ ถูกต้อง! จำส่วนนี้ให้ดี ♥"; $("feedback").className="feedback good"; score++; }
  else { $("feedback").textContent="ส่วนที่ต้องจำคือช่องกรอบประ ♥ — ลองสังเกตอีกครั้ง"; $("feedback").className="feedback bad"; }
  $("nextBtn").disabled=false; $("checkBtn").disabled=true;
  $("prog").innerHTML="ระดับ <b>"+level+"</b> · ชุด <b>"+(setIdx+1)+"</b>/"+NSETS+" · คำ <b>"+(wordIdx+1)+"</b>/"+PER+" · ถูก "+score;
};
$("clearBtn").onclick=()=>{ sel.clear(); [...$("word").children].forEach(el=>el.classList.remove("heart")); };
$("nextBtn").onclick=()=>{ wordIdx++; if(wordIdx>=PER) showSetDone(); else load(); };

function showSetDone(){
  $("game").style.display="none"; $("setdone").style.display="";
  $("sdTitle").textContent="จบชุดที่ "+(setIdx+1)+" ("+level+") · ได้ "+score+" / "+PER;
  $("sdSub").textContent = score===PER ? "เก่งมาก! จำคำที่ต้องจำได้ครบทุกคำ ♥" : "ทำได้ดี! ลองทบทวนคำที่พลาดอีกครั้ง";
  const lastSet = setIdx===NSETS-1, lastLv = level==="Y6";
  $("sdNext").textContent = lastSet ? (lastLv ? "เริ่มใหม่ (Y4)" : "ไประดับ "+LV[LV.indexOf(level)+1]+" →") : "ชุดต่อไป →";
}
$("sdNext").onclick=()=>{
  if(setIdx<NSETS-1){ setIdx++; }
  else if(level!=="Y6"){ level=LV[LV.indexOf(level)+1]; setIdx=0; [...$("levels").children].forEach(c=>c.classList.toggle("on",c.dataset.l===level)); buildSetChips(); }
  else { level="Y4"; setIdx=0; [...$("levels").children].forEach(c=>c.classList.toggle("on",c.dataset.l==="Y4")); buildSetChips(); }
  startSet();
};

buildSetChips();
startSet();
</script>
