<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panyaden · Thai Literacy Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Local stylesheets, cache-busted per load (same ?v= trick as the JS below)
       so CSS edits always show without a manual hard refresh. document.write keeps
       them render-blocking and preserves order during parse. -->
  <script>
    (function () {
      var v = "?v=" + Date.now();
      ["styles", "board", "pages"].forEach(function (f) {
        document.write('<link rel="stylesheet" href="' + f + '.css' + v + '">');
      });
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Local data + components, loaded fresh each visit.
       A per-load ?v= cache-buster avoids stale GitHub Pages / browser caching
       so updates always show without a manual hard refresh. Order is preserved
       because document.write runs synchronously during parsing; Babel transforms
       the text/babel scripts on DOMContentLoaded after thai-data.js has executed. -->
  <script>
    (function () {
      var v = "?v=" + Date.now();
      document.write('<script src="thai-data.js' + v + '"><\/script>');
      ["ui", "tweaks-panel", "board", "wordmat", "pages", "app"].forEach(function (f) {
        document.write('<script type="text/babel" src="' + f + '.jsx' + v + '"><\/script>');
      });
    })();
  </script>
</body>
</html>
