<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PANYA · Letter Tracing · เขียนพยัญชนะ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="interactive.css" />
<style>
  .stage{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;justify-content:center;}
  .padwrap{position:relative;width:380px;max-width:86vw;}
  .pad{width:100%;aspect-ratio:1/1;border:2px solid var(--line-2);border-radius:20px;background:#fff;touch-action:none;cursor:crosshair;display:block;}
  .tools{display:flex;flex-direction:column;gap:10px;}
  .tool{width:50px;height:50px;border-radius:14px;border:2px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-size:22px;cursor:pointer;display:grid;place-items:center;-webkit-tap-highlight-color:transparent;}
  .tool.on{background:var(--leaf);color:#fff;border-color:transparent;}
  .lethint{font-family:var(--thai);color:var(--ink-3);font-size:.95rem;text-align:center;margin:10px 0 0;}
  .cover{height:12px;border-radius:999px;background:var(--leaf-l);overflow:hidden;margin:12px 0 2px;}
  .cover>i{display:block;height:100%;width:0;background:var(--leaf);transition:width .15s;}
  .chips .lvchip{font-family:var(--thai);font-size:1.5rem;min-width:54px;text-align:center;padding:6px 12px;}
  .chips .lvchip.done{background:var(--leaf-l);color:var(--leaf-d);border-color:var(--leaf);}
  .chips .lvchip.done::after{content:" ✓";font-size:1rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="logo">P</span>
    <div><div class="bn">PANYA</div><div class="bs">Letter Tracing · เขียนพยัญชนะ</div></div>
    <span class="spacer"></span><a class="home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก</a>
  </div>
  <div class="eyebrow">Interactive · Beginner · อักษรกลางชุดแรก</div>
  <h1>ลากตามรอยพยัญชนะ</h1>
  <p class="sub">เขียนตามรอยตัวอักษรแบบอิสระ (free-hand) ด้วยนิ้ว/เมาส์ · ให้เส้นอยู่ในกรอบตัวอักษรก็พอ แล้วกด “เสียง” เพื่อฟังชื่อพยัญชนะ</p>

  <div class="bar">
    <div class="chips" id="picker"></div>
    <div class="prog" id="prog"></div>
  </div>

  <div id="game">
    <div class="card">
      <div class="stage">
        <div class="tools">
          <button class="tool on" id="tFinger" title="นิ้ว · finger">🖐️</button>
          <button class="tool" id="tPencil" title="ดินสอ · pencil">✏️</button>
        </div>
        <div class="padwrap">
          <canvas class="pad" id="pad" width="400" height="400"></canvas>
        </div>
      </div>
      <div class="cover"><i id="coverFill"></i></div>
      <p class="lethint" id="lethint"></p>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn ghost" id="clearBtn">↺ ทำใหม่</button>
        <button class="btn check" id="soundBtn">🔊 เสียง</button>
        <button class="btn next" id="nextBtn">ตัวถัดไป →</button>
      </div>
    </div>
  </div>

  <div class="card done" id="done" style="display:none">
    <div class="big">⭐</div><h2 id="dt"></h2><p class="sub" id="ds"></p>
    <div class="actions"><button class="btn check" id="again">เริ่มใหม่</button></div>
  </div>
</div>

<script>
const LETTERS=[
  {c:"ก",name:"กอ ไก่",audio:"audio/mid-ko-kai.mp3",hint:"ก ไม่มีหัว — เริ่มล่างซ้าย ขึ้นก้าน โค้งหลังคา ลงก้านขวา"},
  {c:"จ",name:"จอ จาน",audio:"audio/mid-jo-jan.mp3",hint:"เริ่มที่หัวด้านบน วนแล้วลากโค้งลงหาง"},
  {c:"ด",name:"ดอ เด็ก",audio:"audio/mid-do-dek.mp3",hint:"เริ่มที่หัว วนเป็นวง แล้วลากเส้นตัว"},
  {c:"ต",name:"ตอ เต่า",audio:"audio/mid-to-tao.mp3",hint:"เริ่มที่หัว แล้วลากเส้นตามรูป"},
  {c:"บ",name:"บอ ใบไม้",audio:"audio/mid-bo-baimai.mp3",hint:"เริ่มที่หัว ลากลงแล้ววนท้อง"},
  {c:"ป",name:"ปอ ปลา",audio:"audio/mid-po-pla.mp3",hint:"เริ่มที่หัว ลากขึ้นยอดธง แล้วลงตัว"},
  {c:"อ",name:"ออ อ่าง",audio:"audio/mid-o-ang.mp3",hint:"เริ่มที่หัว วนเป็นวงเดียว"},
];
// Writing guide per letter: start dot ● + direction arrows, positioned as
// fractions of the glyph bounding box. deg: 0=→ 90=↓ 180=← 270=↑.
// ก follows the teacher's reference image; the rest use standard Thai stroke order.
const GUIDES={
  "ก":{s:[0.13,0.92],a:[[0.13,0.45,270],[0.5,0.06,0],[0.9,0.55,90]]},
  "จ":{head:1,a:[[0.30,0.60,90],[0.55,0.93,0],[0.83,0.55,270],[0.45,0.06,180]]},
  "ด":{head:1,a:[[0.30,0.26,270],[0.55,0.06,0],[0.86,0.55,90]]},
  "ต":{head:1,a:[[0.22,0.30,270],[0.55,0.08,0],[0.86,0.45,90],[0.30,0.88,90]]},
  "บ":{head:1,a:[[0.15,0.52,90],[0.5,0.9,0],[0.88,0.5,270]]},
  "ป":{head:1,a:[[0.15,0.55,90],[0.5,0.9,0],[0.88,0.40,270]]},
  "อ":{head:1,a:[[0.42,0.07,180],[0.11,0.5,90],[0.6,0.92,0],[0.9,0.5,270]]},
};
const SIZE=400, STEP=7, THRESH=0.55;
const $=id=>document.getElementById(id);
const pad=$("pad"), ctx=pad.getContext("2d");
const mask=document.createElement("canvas"); mask.width=mask.height=SIZE; const mctx=mask.getContext("2d");
const ink=document.createElement("canvas"); ink.width=ink.height=SIZE; const ictx=ink.getContext("2d");
const scratch=document.createElement("canvas"); scratch.width=scratch.height=SIZE; const sctx=scratch.getContext("2d");
// `ink` = the thin freehand pen line that is shown; `cov` = a wider invisible
// stroke along the same path used only to measure how much of the letter the
// child's line has passed through (so a single centre trace counts as done).
const cov=document.createElement("canvas"); cov.width=cov.height=SIZE; const cctx=cov.getContext("2d");
const COVERW=46, PEN_FINGER=9, PEN_PENCIL=6, PENCOLOR="#2b5d8a";

let idx=0, pen=PEN_FINGER, drawing=false, last=null, cells=[], done=new Array(LETTERS.length).fill(false);

function buildPicker(){
  const p=$("picker"); p.innerHTML="";
  LETTERS.forEach((L,i)=>{
    const b=document.createElement("button");
    b.className="lvchip"+(i===idx?" on":"")+(done[i]?" done":"");
    b.textContent=L.c; b.onclick=()=>{ idx=i; setup(); };
    p.appendChild(b);
  });
}
function glyphFont(){ return "800 270px Sarabun, sans-serif"; }
function drawGlyphTo(c,fill,dash,lw){
  c.clearRect(0,0,SIZE,SIZE);
  c.font=glyphFont(); c.textAlign="center"; c.textBaseline="middle";
  c.fillStyle=fill; c.fillText(LETTERS[idx].c, SIZE/2, SIZE/2+14);
  if(dash){ c.save(); c.setLineDash([7,9]); c.lineWidth=lw||3; c.strokeStyle="#b9ac8e"; c.lineJoin="round";
    c.strokeText(LETTERS[idx].c, SIZE/2, SIZE/2+14); c.restore(); }
}
let bbox={x:0,y:0,w:SIZE,h:SIZE}, headPt=null;
function buildMask(){
  drawGlyphTo(mctx,"#000",false,0);
  const d=mctx.getImageData(0,0,SIZE,SIZE).data; cells=[];
  let mnX=SIZE,mnY=SIZE,mxX=0,mxY=0;
  for(let y=0;y<SIZE;y+=STEP) for(let x=0;x<SIZE;x+=STEP){
    if(d[(y*SIZE+x)*4+3]>128){ cells.push([x,y]); if(x<mnX)mnX=x; if(x>mxX)mxX=x; if(y<mnY)mnY=y; if(y>mxY)mxY=y; }
  }
  bbox={x:mnX,y:mnY,w:Math.max(1,mxX-mnX),h:Math.max(1,mxY-mnY)};
}
// Detect the หัว (head): the largest enclosed counter inside the glyph, by
// flood-filling background from the border and finding the biggest trapped hole.
function detectHead(){
  const d=mctx.getImageData(0,0,SIZE,SIZE).data, W=SIZE, H=SIZE;
  const isBg=i=>d[i*4+3]<128;
  const out=new Uint8Array(W*H), st=[];
  const seed=(x,y)=>{ if(x<0||y<0||x>=W||y>=H)return; const i=y*W+x; if(out[i]||!isBg(i))return; out[i]=1; st.push(i); };
  for(let x=0;x<W;x++){ seed(x,0); seed(x,H-1); } for(let y=0;y<H;y++){ seed(0,y); seed(W-1,y); }
  while(st.length){ const i=st.pop(), x=i%W, y=(i/W)|0; seed(x-1,y); seed(x+1,y); seed(x,y-1); seed(x,y+1); }
  const seen=new Uint8Array(W*H); let best=null,bestN=0;
  for(let i=0;i<W*H;i++){
    if(isBg(i)&&!out[i]&&!seen[i]){
      let n=0,sx=0,sy=0; const q=[i]; seen[i]=1;
      while(q.length){ const j=q.pop(), x=j%W, y=(j/W)|0; n++; sx+=x; sy+=y;
        const nb=[j-1,j+1,j-W,j+W]; for(const k of nb){ if(k<0||k>=W*H)continue; if(isBg(k)&&!out[k]&&!seen[k]){ seen[k]=1; q.push(k); } } }
      if(n>bestN){ bestN=n; best={x:sx/n,y:sy/n}; }
    }
  }
  return bestN>40?best:null;
}
// Coverage = how much of the glyph the (wide) cov stroke has passed through.
function covInsideGlyph(){
  sctx.clearRect(0,0,SIZE,SIZE);
  sctx.drawImage(cov,0,0);
  sctx.globalCompositeOperation="destination-in"; sctx.drawImage(mask,0,0);
  sctx.globalCompositeOperation="source-over";
}
function arrowMark(c,x,y,deg){
  c.save(); c.translate(x,y); c.rotate(deg*Math.PI/180);
  c.fillStyle="#5c5341";
  c.beginPath(); c.moveTo(14,0); c.lineTo(-7,-10); c.lineTo(-7,10); c.closePath(); c.fill();
  c.restore();
}
function drawGuide(c){
  const g=GUIDES[LETTERS[idx].c]; if(!g) return;
  const px=f=>bbox.x+f*bbox.w, py=f=>bbox.y+f*bbox.h;
  (g.a||[]).forEach(([fx,fy,deg])=>arrowMark(c,px(fx),py(fy),deg));
  let sx,sy;
  if(g.head && headPt){ sx=headPt.x; sy=headPt.y; } else { sx=px(g.s[0]); sy=py(g.s[1]); }
  c.beginPath(); c.arc(sx,sy,12,0,7); c.fillStyle="#c98a3b"; c.fill();
  c.lineWidth=3.5; c.strokeStyle="#fff"; c.stroke();
}
function render(){
  ctx.clearRect(0,0,SIZE,SIZE);
  drawGlyphTo(ctx,"#f3ecdb",true,2.5);  // pale letter "road" + dashed outline guide
  drawGuide(ctx);                       // start dot + direction arrows
  ctx.drawImage(ink,0,0);               // thin freehand pen line, shown as the child wrote it
}
function coverage(){
  if(!cells.length) return 0;
  covInsideGlyph();
  const d=sctx.getImageData(0,0,SIZE,SIZE).data; let hit=0;
  for(const [x,y] of cells){ if(d[(y*SIZE+x)*4+3]>40) hit++; }
  return hit/cells.length;
}
function updateCover(){
  const c=coverage(); $("coverFill").style.width=Math.round(c*100)+"%";
  if(c>=THRESH && !done[idx]) win();
}
function win(){
  done[idx]=true; buildPicker();
  $("feedback").textContent="เก่งมาก! เขียน "+LETTERS[idx].c+" สำเร็จ ⭐"; $("feedback").className="feedback good";
  playSound();
  const n=done.filter(Boolean).length;
  $("prog").innerHTML="ผ่าน <b>"+n+"</b> / "+LETTERS.length;
  if(n===LETTERS.length){ setTimeout(()=>{ $("game").style.display="none"; $("done").style.display="";
    $("dt").textContent="เขียนครบทั้ง 7 ตัวแล้ว!"; $("ds").textContent="เยี่ยมมาก หนูเขียนอักษรกลางชุดแรกได้ครบ ก จ ด ต บ ป อ"; }, 900); }
}
function setup(){
  pen=$("tPencil").classList.contains("on")?PEN_PENCIL:PEN_FINGER;
  ictx.clearRect(0,0,SIZE,SIZE); cctx.clearRect(0,0,SIZE,SIZE);
  buildMask();
  headPt = (GUIDES[LETTERS[idx].c]||{}).head ? detectHead() : null;
  buildPicker(); render();
  $("coverFill").style.width="0%";
  $("lethint").textContent=LETTERS[idx].hint;
  $("feedback").textContent=""; $("feedback").className="feedback";
  const n=done.filter(Boolean).length; $("prog").innerHTML="ผ่าน <b>"+n+"</b> / "+LETTERS.length;
}
function pos(e){
  const r=pad.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*SIZE, y:(e.clientY-r.top)/r.height*SIZE };
}
function inkSeg(c,col,w,a,b){
  c.strokeStyle=col; c.lineWidth=w; c.lineCap="round"; c.lineJoin="round";
  c.beginPath(); c.moveTo(a.x,a.y); c.lineTo(b.x,b.y); c.stroke();
}
function strokeTo(p){
  inkSeg(ictx, PENCOLOR, pen, last, p);   // thin visible pen line
  inkSeg(cctx, "#000", COVERW, last, p);  // wide hidden line for coverage
  last=p; render();
}
pad.addEventListener("pointerdown",e=>{ try{ pad.setPointerCapture(e.pointerId); }catch(_){} drawing=true; last=pos(e);
  ictx.fillStyle=PENCOLOR; ictx.beginPath(); ictx.arc(last.x,last.y,pen/2,0,7); ictx.fill();
  cctx.fillStyle="#000"; cctx.beginPath(); cctx.arc(last.x,last.y,COVERW/2,0,7); cctx.fill(); render(); });
pad.addEventListener("pointermove",e=>{ if(drawing) strokeTo(pos(e)); });
pad.addEventListener("pointerup",()=>{ if(!drawing)return; drawing=false; updateCover(); });
pad.addEventListener("pointercancel",()=>{ drawing=false; updateCover(); });

$("tFinger").onclick=()=>{ $("tFinger").classList.add("on"); $("tPencil").classList.remove("on"); pen=PEN_FINGER; };
$("tPencil").onclick=()=>{ $("tPencil").classList.add("on"); $("tFinger").classList.remove("on"); pen=PEN_PENCIL; };
$("clearBtn").onclick=()=>{ ictx.clearRect(0,0,SIZE,SIZE); cctx.clearRect(0,0,SIZE,SIZE); render(); $("coverFill").style.width="0%"; $("feedback").textContent=""; $("feedback").className="feedback"; };
$("soundBtn").onclick=()=>playSound();
$("nextBtn").onclick=()=>{ idx=(idx+1)%LETTERS.length; setup(); };
$("again").onclick=()=>{ done.fill(false); idx=0; $("done").style.display="none"; $("game").style.display=""; setup(); };

let audioEl=null;
function playSound(){
  const L=LETTERS[idx];
  if(L.audio){
    try{ if(audioEl){ audioEl.pause(); } audioEl=new Audio(L.audio); audioEl.play().catch(()=>speakTTS(L.name)); return; }catch(e){}
  }
  speakTTS(L.name);
}
function speakTTS(txt){
  try{ const u=new SpeechSynthesisUtterance(txt); u.lang="th-TH"; u.rate=.85; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){}
}
(document.fonts&&document.fonts.ready?document.fonts.ready:Promise.resolve()).then(()=>setup());
</script>
</body>
</html>
