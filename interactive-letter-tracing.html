<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PANYA · Letter Tracing · เขียนพยัญชนะ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="interactive.css" />
<style>
  .stage{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;justify-content:center;}
  .padwrap{position:relative;width:340px;max-width:84vw;}
  .pad{width:100%;aspect-ratio:3/4;border:2px solid var(--line-2);border-radius:20px;background:#fff;touch-action:none;cursor:crosshair;display:block;}
  .tools{display:flex;flex-direction:column;gap:10px;}
  .tool{width:50px;height:50px;border-radius:14px;border:2px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-size:22px;cursor:pointer;display:grid;place-items:center;-webkit-tap-highlight-color:transparent;}
  .tool.on{background:var(--leaf);color:#fff;border-color:transparent;}
  .lethint{font-family:var(--thai);color:var(--ink-3);font-size:.95rem;text-align:center;margin:10px 0 0;}
  .cover{height:12px;border-radius:999px;background:var(--leaf-l);overflow:hidden;margin:12px 0 2px;}
  .cover>i{display:block;height:100%;width:0;background:var(--leaf);transition:width .15s;}
  .chips .lvchip{font-family:var(--thai);font-size:1.5rem;min-width:54px;text-align:center;padding:6px 12px;}
  .chips .lvchip.done{background:var(--leaf-l);color:var(--leaf-d);border-color:var(--leaf);}
  .chips .lvchip.done::after{content:" ✓";font-size:1rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="logo">P</span>
    <div><div class="bn">PANYA</div><div class="bs">Letter Tracing · เขียนพยัญชนะ</div></div>
    <span class="spacer"></span><a class="home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก</a>
  </div>
  <div class="eyebrow">Interactive · Beginner · อักษรกลางชุดแรก</div>
  <h1>ลากตามรอยพยัญชนะ</h1>
  <p class="sub">เขียนตามรอยตัวอักษรแบบอิสระ (free-hand) ด้วยนิ้ว/เมาส์ · เริ่มที่จุด ● แล้วลากตามลูกศรในภาพ ให้เส้นอยู่ในกรอบก็พอ แล้วกด “เสียง” เพื่อฟังชื่อพยัญชนะ</p>

  <div class="bar">
    <div class="chips" id="picker"></div>
    <div class="prog" id="prog"></div>
  </div>

  <div id="game">
    <div class="card">
      <div class="stage">
        <div class="tools">
          <button class="tool on" id="tFinger" title="นิ้ว · finger">🖐️</button>
          <button class="tool" id="tPencil" title="ดินสอ · pencil">✏️</button>
        </div>
        <div class="padwrap">
          <canvas class="pad" id="pad" width="432" height="576"></canvas>
        </div>
      </div>
      <div class="cover"><i id="coverFill"></i></div>
      <p class="lethint" id="lethint"></p>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn ghost" id="clearBtn">↺ ทำใหม่</button>
        <button class="btn check" id="soundBtn">🔊 เสียง</button>
        <button class="btn next" id="nextBtn">ตัวถัดไป →</button>
      </div>
    </div>
  </div>

  <div class="card done" id="done" style="display:none">
    <div class="big">⭐</div><h2 id="dt"></h2><p class="sub" id="ds"></p>
    <div class="actions"><button class="btn check" id="again">เริ่มใหม่</button></div>
  </div>
</div>

<script>
const LETTERS=[
  {c:"ก",f:"images/trace/k.png",name:"กอ ไก่",audio:"audio/mid-ko-kai.mp3"},
  {c:"จ",f:"images/trace/j.png",name:"จอ จาน",audio:"audio/mid-jo-jan.mp3"},
  {c:"ด",f:"images/trace/d.png",name:"ดอ เด็ก",audio:"audio/mid-do-dek.mp3"},
  {c:"ต",f:"images/trace/t.png",name:"ตอ เต่า",audio:"audio/mid-to-tao.mp3"},
  {c:"บ",f:"images/trace/b.png",name:"บอ ใบไม้",audio:"audio/mid-bo-baimai.mp3"},
  {c:"ป",f:"images/trace/p.png",name:"ปอ ปลา",audio:"audio/mid-po-pla.mp3"},
  {c:"อ",f:"images/trace/o.png",name:"ออ อ่าง",audio:"audio/mid-o-ang.mp3"},
];
const W=432, H=576, STEP=7, THRESH=0.50;
const COVERW=72, PEN_FINGER=9, PEN_PENCIL=6, PENCOLOR="#2b5d8a";
const $=id=>document.getElementById(id);
const pad=$("pad"), ctx=pad.getContext("2d");
const guide=document.createElement("canvas"); guide.width=W; guide.height=H; const gctx=guide.getContext("2d");
const ink=document.createElement("canvas"); ink.width=W; ink.height=H; const ictx=ink.getContext("2d");
const cov=document.createElement("canvas"); cov.width=W; cov.height=H; const cctx=cov.getContext("2d");

let idx=0, pen=PEN_FINGER, drawing=false, last=null, cells=[], done=new Array(LETTERS.length).fill(false);
const imgs={};

function buildPicker(){
  const p=$("picker"); p.innerHTML="";
  LETTERS.forEach((L,i)=>{
    const b=document.createElement("button");
    b.className="lvchip"+(i===idx?" on":"")+(done[i]?" done":"");
    b.textContent=L.c; b.onclick=()=>{ idx=i; setup(); };
    p.appendChild(b);
  });
}
// Fit the worksheet image fully inside the canvas (contain), centred.
function fitRect(iw,ih){ const s=Math.min(W/iw,H/ih), w=iw*s, h=ih*s; return {x:(W-w)/2,y:(H-h)/2,w,h}; }
function drawGuide(){
  const im=imgs[LETTERS[idx].c];
  gctx.clearRect(0,0,W,H);
  if(im && im.naturalWidth){ const r=fitRect(im.naturalWidth,im.naturalHeight); gctx.drawImage(im,r.x,r.y,r.w,r.h); }
}
// Road = the writable band of the letter: the largest WHITE region that is
// enclosed by the black outline (i.e. not reachable from the border). Counters
// (loop holes) and the outer background are excluded.
function buildRoad(){
  const d=gctx.getImageData(0,0,W,H).data, N=W*H;
  const white=i=>{ const a=d[i*4+3]; return a<40 || (d[i*4]>205 && d[i*4+1]>205 && d[i*4+2]>205); };
  const isWhitePix=i=>{ const a=d[i*4+3]; return a>40 && d[i*4]>205 && d[i*4+1]>205 && d[i*4+2]>205; };
  const outer=new Uint8Array(N), st=[];
  const seed=i=>{ if(i<0||i>=N||outer[i]||!white(i))return; outer[i]=1; st.push(i); };
  for(let x=0;x<W;x++){ seed(x); seed((H-1)*W+x); } for(let y=0;y<H;y++){ seed(y*W); seed(y*W+W-1); }
  while(st.length){ const i=st.pop(), x=i%W; if(x>0)seed(i-1); if(x<W-1)seed(i+1); seed(i-W); seed(i+W); }
  const seen=new Uint8Array(N); let best=null,bestN=0;
  for(let i=0;i<N;i++){
    if(isWhitePix(i)&&!outer[i]&&!seen[i]){
      const comp=[i]; seen[i]=1; let h=0;
      while(h<comp.length){ const j=comp[h++], x=j%W;
        const nb=[x>0?j-1:-1, x<W-1?j+1:-1, j-W, j+W];
        for(const k of nb){ if(k<0||k>=N)continue; if(isWhitePix(k)&&!outer[k]&&!seen[k]){ seen[k]=1; comp.push(k); } } }
      if(comp.length>bestN){ bestN=comp.length; best=comp; }
    }
  }
  const road=new Uint8Array(N); cells=[];
  if(best) for(const j of best) road[j]=1;
  for(let y=0;y<H;y+=STEP) for(let x=0;x<W;x+=STEP){ if(road[y*W+x]) cells.push([x,y]); }
}
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(guide,0,0);   // the worksheet letter (road + dashed centre + arrows + start dot)
  ctx.drawImage(ink,0,0);     // thin free-hand pen line, shown as written
}
function coverage(){
  if(!cells.length) return 0;
  const d=cctx.getImageData(0,0,W,H).data; let hit=0;
  for(const [x,y] of cells){ if(d[(y*W+x)*4+3]>40) hit++; }
  return hit/cells.length;
}
function updateCover(){
  const c=coverage(); $("coverFill").style.width=Math.round(c*100)+"%";
  if(c>=THRESH && !done[idx]) win();
}
function win(){
  done[idx]=true; buildPicker();
  $("feedback").textContent="เก่งมาก! เขียน "+LETTERS[idx].c+" สำเร็จ ⭐"; $("feedback").className="feedback good";
  playSound();
  const n=done.filter(Boolean).length;
  $("prog").innerHTML="ผ่าน <b>"+n+"</b> / "+LETTERS.length;
  if(n===LETTERS.length){ setTimeout(()=>{ $("game").style.display="none"; $("done").style.display="";
    $("dt").textContent="เขียนครบทั้ง 7 ตัวแล้ว!"; $("ds").textContent="เยี่ยมมาก หนูเขียนอักษรกลางชุดแรกได้ครบ ก จ ด ต บ ป อ"; }, 900); }
}
function setup(){
  pen=$("tPencil").classList.contains("on")?PEN_PENCIL:PEN_FINGER;
  ictx.clearRect(0,0,W,H); cctx.clearRect(0,0,W,H);
  drawGuide(); buildRoad(); buildPicker(); render();
  $("coverFill").style.width="0%";
  $("lethint").textContent=LETTERS[idx].name+" · เริ่มที่จุด ● แล้วลากตามลูกศร";
  $("feedback").textContent=""; $("feedback").className="feedback";
  const n=done.filter(Boolean).length; $("prog").innerHTML="ผ่าน <b>"+n+"</b> / "+LETTERS.length;
}
function pos(e){
  const r=pad.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H };
}
function inkSeg(c,col,w,a,b){
  c.strokeStyle=col; c.lineWidth=w; c.lineCap="round"; c.lineJoin="round";
  c.beginPath(); c.moveTo(a.x,a.y); c.lineTo(b.x,b.y); c.stroke();
}
function strokeTo(p){
  inkSeg(ictx, PENCOLOR, pen, last, p);   // thin visible pen line
  inkSeg(cctx, "#000", COVERW, last, p);  // wide hidden line for coverage
  last=p; render();
}
pad.addEventListener("pointerdown",e=>{ try{ pad.setPointerCapture(e.pointerId); }catch(_){} drawing=true; last=pos(e);
  ictx.fillStyle=PENCOLOR; ictx.beginPath(); ictx.arc(last.x,last.y,pen/2,0,7); ictx.fill();
  cctx.fillStyle="#000"; cctx.beginPath(); cctx.arc(last.x,last.y,COVERW/2,0,7); cctx.fill(); render(); });
pad.addEventListener("pointermove",e=>{ if(drawing) strokeTo(pos(e)); });
pad.addEventListener("pointerup",()=>{ if(!drawing)return; drawing=false; updateCover(); });
pad.addEventListener("pointercancel",()=>{ drawing=false; updateCover(); });

$("tFinger").onclick=()=>{ $("tFinger").classList.add("on"); $("tPencil").classList.remove("on"); pen=PEN_FINGER; };
$("tPencil").onclick=()=>{ $("tPencil").classList.add("on"); $("tFinger").classList.remove("on"); pen=PEN_PENCIL; };
$("clearBtn").onclick=()=>{ ictx.clearRect(0,0,W,H); cctx.clearRect(0,0,W,H); render(); $("coverFill").style.width="0%"; $("feedback").textContent=""; $("feedback").className="feedback"; };
$("soundBtn").onclick=()=>playSound();
$("nextBtn").onclick=()=>{ idx=(idx+1)%LETTERS.length; setup(); };
$("again").onclick=()=>{ done.fill(false); idx=0; $("done").style.display="none"; $("game").style.display=""; setup(); };

let audioEl=null;
function playSound(){
  const L=LETTERS[idx];
  if(L.audio){
    try{ if(audioEl){ audioEl.pause(); } audioEl=new Audio(L.audio); audioEl.play().catch(()=>speakTTS(L.name)); return; }catch(e){}
  }
  speakTTS(L.name);
}
function speakTTS(txt){
  try{ const u=new SpeechSynthesisUtterance(txt); u.lang="th-TH"; u.rate=.85; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){}
}
function loadImg(src){ return new Promise(res=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>res(im); im.src=src; }); }
(async()=>{ for(const L of LETTERS){ imgs[L.c]=await loadImg(L.f); } setup(); })();
</script>
</body>
</html>
