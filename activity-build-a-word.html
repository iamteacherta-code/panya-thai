<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PANYA · Activity Sheets — Build-a-Word (Intermediate)</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   PANYA · Build-a-Word Activity Sheets (Intermediate)
   Printable A4 worksheets — warm earth-wood-leaf design system,
   matching the Thai Literacy Studio app and the Letter Formation
   activity sheets. Combine consonant + vowel (+ final / tone) to
   build real, decodable Thai words.
   ============================================================ */
:root{
  --bg:#f4efe4; --surface:#fbf8f1; --line:#e3d9c4; --line-2:#d6c8ab;
  --ink:#2f2a20; --ink-2:#5c5341; --ink-3:#8a7e66;
  --leaf:#5b7a4b; --leaf-d:#45603a; --leaf-l:#e6eddf;
  --earth:#c98a3b; --earth-d:#a86d24; --earth-l:#f6e8d2;
  --clay:#b05c3c; --clay-l:#f3ddd2; --sky:#6f9bb0; --sky-l:#e2ecf1;
  --ghost:#d8cdb4;
  --font-ui:"Sarabun",system-ui,-apple-system,sans-serif;
  --font-thai:"TH Sarabun","Sarabun",sans-serif;
  --font-hand:"Mali","Sarabun",sans-serif;
}
@font-face{
  font-family:"TH Sarabun";
  src:url("fonts/Sarabun-Regular.ttf") format("truetype");
  font-weight:100 500; font-style:normal; font-display:swap;
}
@font-face{
  font-family:"TH Sarabun";
  src:url("fonts/Sarabun-Bold.ttf") format("truetype");
  font-weight:501 900; font-style:normal; font-display:swap;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-ui); color:var(--ink); background:var(--bg);
  background-image:radial-gradient(circle at 1px 1px, rgba(120,100,60,.07) 1px, transparent 0);
  background-size:22px 22px;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}

/* ---------- Toolbar (screen only) ---------- */
.toolbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:12px 22px; background:rgba(251,248,241,.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.toolbar .tb-title{font-weight:800; letter-spacing:.04em;}
.toolbar .tb-title small{display:block; font-weight:600; color:var(--ink-3); font-size:12px; letter-spacing:.02em;}
.toolbar .spacer{margin-left:auto;}
.btn{
  display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line-2);
  background:var(--surface); color:var(--ink); font-family:inherit; font-weight:700; font-size:14px;
  padding:10px 16px; border-radius:999px; cursor:pointer;
}
.btn-primary{background:var(--earth); color:#fff; border-color:var(--earth-d); box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);}
.btn-primary:hover{background:var(--earth-d);}
.btn-home{text-decoration:none; background:var(--leaf); color:#fff; border-color:var(--leaf-d); box-shadow:inset 0 -3px 0 rgba(0,0,0,.12); margin-right:4px;}
.btn-home:hover{background:var(--leaf-d);}
.hint{color:var(--ink-3); font-size:13px;}

/* ---------- Sheet (A4) ---------- */
.sheets{padding:26px 14px 60px; display:flex; flex-direction:column; align-items:center; gap:26px;}
.sheet{
  width:210mm; min-height:297mm; background:#fff; color:var(--ink);
  border:1px solid var(--line); border-radius:10px;
  box-shadow:0 2px 6px rgba(60,48,28,.08), 0 22px 50px -22px rgba(60,48,28,.30);
  padding:15mm 14mm 13mm; position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}

/* ---------- Fill-the-page practice panel (grows to fill leftover height) ---------- */
.extra{flex:1; min-height:52px; margin-top:14px; border:1.8px dashed var(--line-2); border-radius:16px;
  background:repeating-linear-gradient(45deg, transparent 0 12px, rgba(170,140,90,.045) 12px 24px);
  padding:12px 18px 16px; display:flex; flex-direction:column;}
.extra .ex-head{font-size:13px; color:var(--earth-d); font-weight:800; font-family:var(--font-thai);}
.extra .ex-head .th{color:var(--ink-3); font-weight:600;}
.extra .ex-space{flex:1; min-height:24px;}
.extra .ex-lines{display:flex; flex-direction:column; gap:24px; padding-bottom:2px;}
.extra .ex-lines .l{border-bottom:1.9px dotted var(--line-2);}

/* ---------- Sheet header ---------- */
.sh-head{display:flex; align-items:flex-start; gap:16px; padding-bottom:12px; border-bottom:2px solid var(--leaf-l);}
.sh-brand{display:flex; align-items:center; gap:11px; flex:none;}
.sh-mark{width:46px; height:46px; flex:none; display:grid; place-items:center;}
.sh-mark img{width:100%; height:100%; object-fit:contain;}
.sh-mark .fallback{
  width:42px; height:42px; border-radius:11px; background:var(--leaf);
  color:#fff; display:grid; place-items:center; font-weight:800; font-size:20px;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);
}
.sh-brand .bn{font-weight:800; font-size:18px; letter-spacing:.26em; line-height:1;}
.sh-brand .bs{font-size:10.5px; color:var(--ink-3); letter-spacing:.04em; margin-top:2px;}
.sh-meta{flex:1;}
.sh-tag-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.eyebrow{font-size:10.5px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--earth-d);}
.badge{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; background:var(--leaf-l); color:var(--leaf-d);}
.badge.earth{background:var(--earth-l); color:var(--earth-d);}
.sh-title{font-size:21px; font-weight:800; margin:5px 0 1px; letter-spacing:-.01em;}
.sh-title .th{font-family:var(--font-thai); font-weight:500; color:var(--ink-2); font-size:17px;}
.sh-fields{flex:none; display:flex; flex-direction:column; gap:7px; min-width:188px;}
.fld{display:flex; align-items:flex-end; gap:7px; font-size:12px; font-weight:700; color:var(--ink-2);}
.fld .th{font-family:var(--font-thai); font-weight:500; color:var(--ink-3); font-size:11px;}
.fld .ln{flex:1; border-bottom:1.6px dotted var(--line-2); height:17px;}
.fld.small{min-width:0;}

/* ---------- Instructions ---------- */
.instruct{display:flex; align-items:center; gap:10px; margin:14px 0 11px; font-size:13.5px; color:var(--ink-2);}
.instruct .n{flex:none; width:24px; height:24px; border-radius:8px; background:var(--earth); color:#fff; font-weight:800; display:grid; place-items:center; font-size:13px; box-shadow:inset 0 -2px 0 rgba(0,0,0,.14);}
.instruct b{color:var(--ink);}
.instruct .th{font-family:var(--font-thai); font-weight:500; color:var(--ink-3);}
.thai{font-family:var(--font-thai);}

/* line-art pictures — outline only, white inside, for children to colour */
.emoji svg{width:1em; height:1em; display:block; fill:none; stroke:var(--ink); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round;}

/* legend chips for tile colours */
.keybar{display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin:2px 0 12px; font-size:11.5px; color:var(--ink-3); font-family:var(--font-thai);}
.keybar .k{display:inline-flex; align-items:center; gap:6px;}
.keybar .sw{width:13px; height:13px; border-radius:4px; border:1.5px solid var(--line-2);}
.keybar .sw.c{background:#fff;} .keybar .sw.v{background:var(--earth-l);} .keybar .sw.f{background:var(--clay-l);} .keybar .sw.t{background:var(--sky-l);}

/* ---------- Equation rows (build a word) ---------- */
.eqlist{display:flex; flex-direction:column; gap:9px; margin-top:4px;}
.eq{display:flex; align-items:center; gap:9px; border:1.6px solid var(--line); border-radius:14px; background:var(--surface); padding:9px 14px;}
.eq .emoji{font-size:38px; line-height:1; flex:none; width:46px; text-align:center;}
.tile{flex:none; min-width:54px; height:60px; padding:0 8px; border:1.7px solid var(--line-2); border-radius:10px; background:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-thai); font-size:36px; font-weight:600; color:var(--leaf-d);}
.tile.v{background:var(--earth-l); color:var(--earth-d);}
.tile.f{background:var(--clay-l); color:var(--clay);}
.tile.t{background:var(--sky-l); color:var(--sky);}
.op{flex:none; font-size:24px; font-weight:800; color:var(--ink-3); width:18px; text-align:center;}
.eqbox{--fs:38px; --pb:12px; flex:1; min-width:120px; height:60px; border:1.8px solid var(--line); border-radius:10px; background:#fff;
  position:relative; display:flex; align-items:flex-end; justify-content:center; padding-bottom:var(--pb);}
.eqbox::after{content:""; position:absolute; left:8%; right:8%; bottom:calc(var(--pb) + 0.078 * var(--fs)); border-bottom:1.5px solid #e7ddc6;}
.eqbox .ans{font-family:var(--font-thai); font-size:38px; font-weight:600; color:var(--leaf-d); line-height:1;}
.eq .gloss{flex:none; width:150px; font-family:var(--font-thai); font-size:13px; color:var(--ink-3); text-align:right; line-height:1.25;}

/* ---------- Build-by-vowel rows ---------- */
.vrow{display:grid; grid-template-columns:88px 1fr; border:1.6px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:11px;}
.vrow .vlead{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; background:var(--earth-l); border-right:1.6px solid var(--line); padding:8px;}
.vrow .vlead .vm{font-family:var(--font-thai); font-size:40px; color:var(--earth-d); line-height:1;}
.vrow .vlead .vr{font-size:11px; color:var(--ink-3);}
.vrow .vcells{display:grid; grid-template-columns:repeat(5,1fr);}
.vcell{border-right:1.4px dashed #ece2cc; padding:9px 6px 10px; text-align:center; display:flex; flex-direction:column; gap:7px; align-items:center;}
.vcell:last-child{border-right:none;}
.vcell .cm{font-family:var(--font-thai); font-size:30px; color:var(--leaf-d); line-height:1;}
.vcell .vbox{--fs:30px; --pb:9px; width:100%; height:52px; border:1.6px solid var(--line); border-radius:9px; background:#fff; position:relative;}
.vcell .vbox::after{content:""; position:absolute; left:12%; right:12%; bottom:calc(var(--pb) + 0.078 * var(--fs)); border-bottom:1.4px solid #ebe1ca;}

/* ---------- Word bank / tiles ---------- */
.bank{display:flex; flex-wrap:wrap; gap:8px 16px; justify-content:center; align-items:center; padding:11px 16px; border:1.8px dashed var(--line-2); border-radius:14px; margin-bottom:6px;}
.bank.c{background:var(--leaf-l);} .bank.r{background:var(--earth-l);}
.bank .bk-lbl{font-family:var(--font-thai); font-size:12px; font-weight:700; margin-right:4px;}
.bank.c .bk-lbl{color:var(--leaf-d);} .bank.r .bk-lbl{color:var(--earth-d);}
.bank .chip{font-family:var(--font-thai); font-size:30px; font-weight:600; color:var(--ink); padding:0 4px;}

/* ---------- Clue grid (build into letter boxes) ---------- */
.clue-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px;}
.clue{display:flex; align-items:center; gap:12px; border:1.6px solid var(--line); border-radius:14px; background:var(--surface); padding:11px 14px;}
.clue .emoji{font-size:42px; line-height:1; flex:none;}
.clue .meaning{font-family:var(--font-thai); font-size:13px; color:var(--ink-3); flex:none; width:74px;}
.boxes{display:flex; gap:7px; margin-left:auto;}
.lbox{--fs:34px; --pb:10px; width:50px; height:58px; border:1.7px solid var(--line); border-radius:9px; background:#fff;
  position:relative; display:flex; align-items:flex-end; justify-content:center; padding-bottom:var(--pb);}
.lbox::after{content:""; position:absolute; left:12%; right:12%; bottom:calc(var(--pb) + 0.078 * var(--fs)); border-bottom:1.4px solid #ebe1ca;}
.lbox .g{font-family:var(--font-thai); font-size:34px; color:transparent; -webkit-text-stroke:1.3px var(--ghost); line-height:1;}
.lbox .m{font-family:var(--font-thai); font-size:34px; color:var(--leaf-d); line-height:1;}

/* ---------- Matrix ---------- */
.matrix{border-collapse:collapse; width:100%; margin-top:4px; table-layout:fixed;}
.matrix th,.matrix td{border:1.5px solid var(--line); height:66px; text-align:center; font-family:var(--font-thai);}
.matrix thead th{background:var(--leaf-l); color:var(--leaf-d); font-size:30px;}
.matrix .corner{background:var(--surface);}
.matrix .rh{background:var(--earth-l); color:var(--earth-d); font-size:30px; width:70px;}

/* ---------- Free-build slots ---------- */
.slot-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px;}
.slot{display:flex; align-items:center; gap:12px; border:1.6px solid var(--line); border-radius:14px; background:var(--surface); padding:12px 16px; min-height:78px;}
.slot .num{flex:none; width:26px; height:26px; border-radius:8px; background:var(--leaf); color:#fff; font-weight:800; display:grid; place-items:center; font-size:13px;}
.slot .hint-th{font-family:var(--font-thai); font-size:14px; color:var(--ink-2); flex:none; width:120px;}
.slot .sline{flex:1; border-bottom:1.9px dotted var(--line-2); height:34px;}

/* ---------- Footer ---------- */
.sh-foot{position:absolute; left:14mm; right:14mm; bottom:8mm; display:flex; align-items:center; justify-content:space-between; font-size:10.5px; color:var(--ink-3); border-top:1.4px solid var(--line); padding-top:7px;}
.sh-foot .th{font-family:var(--font-thai);}
.star-row{display:flex; align-items:center; gap:6px;}
.star{width:15px; height:15px; border:1.6px solid var(--line-2); border-radius:4px;}

/* ---------- Print ---------- */
@media print{
  @page{size:A4; margin:0;}
  body{background:#fff; background-image:none;}
  .toolbar{display:none !important;}
  .sheets{padding:0; gap:0;}
  .sheet{width:210mm; min-height:297mm; box-shadow:none; border:none; border-radius:0; page-break-after:always; break-after:page;}
  .sheet:last-child{page-break-after:auto; break-after:auto;}
}
</style>
</head>
<body>

<div class="toolbar">
  <a class="btn btn-home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก · Home</a>
  <div class="tb-title">PANYA · Activity Sheets
    <small>Build-a-Word · ต่อคำจากพยางค์ — Intermediate</small>
  </div>
  <span class="spacer"></span>
  <span class="hint">10 แผ่น · พิมพ์ลงกระดาษ A4</span>
  <button class="btn btn-primary" onclick="window.print()">🖨️ พิมพ์ / Print</button>
</div>

<div class="sheets" id="sheets"></div>

<script src="activity-art.js"></script>
<script>
/* ---------- shared building blocks ---------- */
const art = window.artIcon;
const LOGO = '<div class="sh-mark"><img src="images/panya-logo.png" alt="PANYA" '
  + 'onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<div class=&quot;fallback&quot;>P</div>\'"></div>';
function head(no, kind, en, th){
  return '<header class="sh-head"><div class="sh-brand">' + LOGO
    + '<div><div class="bn">PANYA</div><div class="bs">Thai Foundation</div></div></div>'
    + '<div class="sh-meta"><div class="sh-tag-row">'
    + '<span class="eyebrow">Build-a-Word</span>'
    + '<span class="badge">Intermediate · ปานกลาง</span>'
    + '<span class="badge earth">แบบที่ ' + no + ' · ' + kind + '</span></div>'
    + '<div class="sh-title">' + en + ' <span class="th">· ' + th + '</span></div></div>'
    + '<div class="sh-fields">'
    + '<div class="fld">ชื่อ <span class="th">Name</span> <span class="ln"></span></div>'
    + '<div class="fld small">วันที่ <span class="th">Date</span> <span class="ln"></span>'
    + '&nbsp;ห้อง <span class="th">Class</span> <span class="ln"></span></div></div></header>';
}
function instruct(n, en, th){
  return '<div class="instruct"><span class="n">' + n + '</span><span><b>' + en + '</b> '
    + '<span class="th">' + th + '</span></span></div>';
}
function foot(th){
  return '<footer class="sh-foot"><span class="th">' + th + '</span>'
    + '<span class="star-row">ระบายดาวเมื่อทำเสร็จ <span class="star"></span><span class="star"></span><span class="star"></span></span></footer>';
}
function sheet(inner){ return '<section class="sheet">' + inner + '</section>'; }
// flexible "practice" panel that stretches to fill the rest of the A4 page
const EXTRA = '<div class="extra"><div class="ex-head">✏️ ฝึกต่อ · Practice more '
  + '<span class="th">— สร้างคำใหม่ของหนูเอง 2 คำ แล้ววาดภาพประกอบ</span></div>'
  + '<div class="ex-space"></div>'
  + '<div class="ex-lines"><span class="l"></span><span class="l"></span></div></div>';
const KEY = '<div class="keybar">'
  + '<span class="k"><span class="sw c"></span> พยัญชนะ · consonant</span>'
  + '<span class="k"><span class="sw v"></span> สระ · vowel</span>'
  + '<span class="k"><span class="sw f"></span> ตัวสะกด · final</span>'
  + '<span class="k"><span class="sw t"></span> วรรณยุกต์ · tone</span></div>';

/* one equation row. parts:[{k:'c|v|f|t', s:'ก'}], ans shown only when ex:true */
function eqRow(r){
  const tiles = r.parts.map((p,idx) => {
    const cls = p.k === 'c' ? 'tile' : 'tile ' + p.k;
    const op = idx === 0 ? '' : '<span class="op">+</span>';
    return op + '<span class="' + cls + '">' + p.s + '</span>';
  }).join('');
  const box = r.ex
    ? '<div class="eqbox"><span class="ans">' + r.ans + '</span></div>'
    : '<div class="eqbox"></div>';
  const emoji = r.e ? '<span class="emoji">' + art(r.e) + '</span>' : '<span class="emoji"></span>';
  return '<div class="eq">' + emoji + tiles + '<span class="op">=</span>' + box
    + '<span class="gloss">' + r.g + '</span></div>';
}
function eqSheet(no, kind, en, th, footTh, intrEn, intrTh, rows){
  return sheet(head(no, kind, en, th) + KEY + instruct(1, intrEn, intrTh)
    + '<div class="eqlist">' + rows.map(eqRow).join('') + '</div>' + EXTRA + foot(footTh));
}

/* ---------- content ---------- */
const FOOT = 'PANYA Thai Foundation · ต่อคำจากพยางค์ — Build-a-Word (ปานกลาง)';

const SHEETS = [];

/* 1 — Consonant + vowel = word (open syllable, แม่ ก กา) */
SHEETS.push(eqSheet(1, 'C + V', 'Consonant + vowel', 'พยัญชนะ + สระ', FOOT,
  'Build the word', 'นำพยัญชนะมาประสมกับสระ แล้วเขียนเป็นคำในกรอบ (แถวแรกคือตัวอย่าง)', [
  {e:'🚶', parts:[{k:'c',s:'ม'},{k:'v',s:'า'}], ans:'มา', ex:true, g:'มา · come'},
  {e:'👍', parts:[{k:'c',s:'ด'},{k:'v',s:'◌ี'}], g:'ดี · good'},
  {e:'🦀', parts:[{k:'c',s:'ป'},{k:'v',s:'◌ู'}], g:'ปู · crab'},
  {e:'👂', parts:[{k:'c',s:'ห'},{k:'v',s:'◌ู'}], g:'หู · ear'},
  {e:'👁️', parts:[{k:'c',s:'ต'},{k:'v',s:'า'}], g:'ตา · eye'},
  {e:'🎨', parts:[{k:'c',s:'ส'},{k:'v',s:'◌ี'}], g:'สี · colour'},
  {e:'🐍', parts:[{k:'c',s:'ง'},{k:'v',s:'◌ู'}], g:'งู · snake'},
  {e:'🍵', parts:[{k:'c',s:'ช'},{k:'v',s:'า'}], g:'ชา · tea'},
]));

/* 2 — Consonant + vowel + final = word (มาตราตัวสะกด) */
SHEETS.push(eqSheet(2, 'C + V + C', 'Add a final', 'พยัญชนะ + สระ + ตัวสะกด', FOOT,
  'Build the word', 'ประสมพยัญชนะ สระ และตัวสะกด แล้วเขียนเป็นคำ (แถวแรกคือตัวอย่าง)', [
  {e:'😋', parts:[{k:'c',s:'ก'},{k:'v',s:'◌ิ'},{k:'f',s:'น'}], ans:'กิน', ex:true, g:'กิน · eat'},
  {e:'🟤', parts:[{k:'c',s:'ด'},{k:'v',s:'◌ิ'},{k:'f',s:'น'}], g:'ดิน · soil'},
  {e:'🍽️', parts:[{k:'c',s:'จ'},{k:'v',s:'า'},{k:'f',s:'น'}], g:'จาน · plate'},
  {e:'👄', parts:[{k:'c',s:'ป'},{k:'v',s:'า'},{k:'f',s:'ก'}], g:'ปาก · mouth'},
  {e:'3️⃣', parts:[{k:'c',s:'ส'},{k:'v',s:'า'},{k:'f',s:'ม'}], g:'สาม · three'},
  {e:'➕', parts:[{k:'c',s:'ม'},{k:'v',s:'า'},{k:'f',s:'ก'}], g:'มาก · many'},
  {e:'🧗', parts:[{k:'c',s:'ป'},{k:'v',s:'◌ี'},{k:'f',s:'น'}], g:'ปีน · climb'},
  {e:'🛏️', parts:[{k:'c',s:'น'},{k:'v',s:'อ'},{k:'f',s:'น'}], g:'นอน · sleep'},
]));

/* 3 — Add the final to a base syllable (เติมตัวสะกด) */
SHEETS.push(eqSheet(3, 'Add final', 'Base + final', 'คำตั้งต้น + ตัวสะกด', FOOT,
  'Add the final', 'เติมตัวสะกดให้คำตั้งต้น แล้วเขียนคำใหม่ (แถวแรกคือตัวอย่าง)', [
  {e:'⭐', parts:[{k:'c',s:'ดา'},{k:'f',s:'ว'}], ans:'ดาว', ex:true, g:'ดาว · star'},
  {e:'🌸', parts:[{k:'c',s:'บา'},{k:'f',s:'น'}], g:'บาน · bloom'},
  {e:'👣', parts:[{k:'c',s:'ตา'},{k:'f',s:'ม'}], g:'ตาม · follow'},
  {e:'➕', parts:[{k:'c',s:'มา'},{k:'f',s:'ก'}], g:'มาก · many'},
  {e:'👄', parts:[{k:'c',s:'ปา'},{k:'f',s:'ก'}], g:'ปาก · mouth'},
  {e:'🟢', parts:[{k:'c',s:'กา'},{k:'f',s:'ง'}], g:'กาง · spread'},
  {e:'🍳', parts:[{k:'c',s:'จา'},{k:'f',s:'น'}], g:'จาน · plate'},
  {e:'🏷️', parts:[{k:'c',s:'นา'},{k:'f',s:'ม'}], g:'นาม · name'},
]));

/* 4 — Word ladder: change the initial (เปลี่ยนพยัญชนะต้น) */
function ladderSheet(no, en, th, footTh, intrTh, vowelChip, vowelRom, steps){
  const cells = steps.map(s =>
    '<div class="vcell"><span class="cm">' + s.c + '</span>'
    + (s.ex ? '<div class="vbox" style="display:flex;align-items:flex-end;justify-content:center;padding-bottom:9px"><span class="cm" style="color:var(--leaf-d)">' + s.ans + '</span></div>'
            : '<div class="vbox"></div>') + '</div>').join('');
  return sheet(head(no, 'Word ladder', en, th)
    + instruct(1, 'Swap the first letter', intrTh)
    + '<div class="vrow"><div class="vlead"><span class="vm">' + vowelChip + '</span><span class="vr">' + vowelRom + '</span></div>'
    + '<div class="vcells">' + cells + '</div></div>'
    + '<div class="keybar"><span class="k thai">คำที่ได้ทุกคำใช้สระเดียวกัน เปลี่ยนเฉพาะพยัญชนะต้น</span></div>'
    + EXTRA + foot(footTh));
}
SHEETS.push(ladderSheet(4, 'Same vowel, new words', 'เปลี่ยนพยัญชนะต้น', FOOT,
  'เปลี่ยนพยัญชนะต้น โดยใช้สระ "า" เหมือนเดิม แล้วเขียนคำใหม่ในกรอบ (ช่องแรกคือตัวอย่าง)',
  'า', 'aa', [
  {c:'ม', ans:'มา', ex:true}, {c:'ห'}, {c:'ต'}, {c:'น'}, {c:'ป'},
]));

/* 5 — Build with each long vowel (สระเสียงยาว า / ◌ี / ◌ู) */
function vowelBuildSheet(no, footTh, rows){
  const body = rows.map(row => {
    const cells = row.cons.map(c =>
      '<div class="vcell"><span class="cm">' + c + '</span><div class="vbox"></div></div>').join('');
    return '<div class="vrow"><div class="vlead"><span class="vm">' + row.v + '</span><span class="vr">' + row.r + '</span></div>'
      + '<div class="vcells">' + cells + '</div></div>';
  }).join('');
  return sheet(head(no, 'By vowel', 'Build with each vowel', 'ประสมตามสระ', footTh.k)
    + instruct(1, 'Build &amp; write', 'ประสมพยัญชนะแต่ละตัวกับสระทางซ้าย แล้วเขียนคำในกรอบ')
    + body + EXTRA + foot(footTh.f));
}
SHEETS.push(vowelBuildSheet(5, {k:FOOT, f:FOOT}, [
  {v:'า', r:'aa', cons:['ก','ต','ม','น','ป']},
  {v:'◌ี', r:'ii', cons:['ด','ป','ม','ส','ต']},
  {v:'◌ู', r:'uu', cons:['ด','ป','ง','ร','ห']},
]));

/* 6 — Add a tone mark (เติมวรรณยุกต์ — family words) */
SHEETS.push(eqSheet(6, 'Tone mark', 'Add a tone mark', 'เติมวรรณยุกต์', FOOT,
  'Add the tone', 'เติมวรรณยุกต์ให้ถูกต้อง แล้วเขียนเป็นคำครอบครัว (แถวแรกคือตัวอย่าง)', [
  {e:'👩', parts:[{k:'c',s:'แม'},{k:'t',s:'◌่'}], ans:'แม่', ex:true, g:'แม่ · mother'},
  {e:'👨', parts:[{k:'c',s:'พ'},{k:'t',s:'◌่'},{k:'f',s:'อ'}], g:'พ่อ · father'},
  {e:'👵', parts:[{k:'c',s:'ย'},{k:'t',s:'◌่'},{k:'v',s:'า'}], g:'ย่า · grandma'},
  {e:'👩‍🦰', parts:[{k:'c',s:'ป'},{k:'t',s:'◌้'},{k:'v',s:'า'}], g:'ป้า · aunt'},
  {e:'👴', parts:[{k:'c',s:'ปู'},{k:'t',s:'◌่'}], g:'ปู่ · grandpa'},
  {e:'🧒', parts:[{k:'c',s:'พี'},{k:'t',s:'◌่'}], g:'พี่ · big sibling'},
]));

/* 7 — Syllable tiles bank → build the clue words */
function tilesSheet(no, footTh, consBank, rimeBank, clues){
  const cb = '<div class="bank c"><span class="bk-lbl">พยัญชนะต้น · initials</span>'
    + consBank.map(c => '<span class="chip">' + c + '</span>').join('') + '</div>';
  const rb = '<div class="bank r"><span class="bk-lbl">สระ/ตัวสะกด · rimes</span>'
    + rimeBank.map(c => '<span class="chip">' + c + '</span>').join('') + '</div>';
  const grid = clues.map(c =>
    '<div class="clue"><span class="emoji">' + art(c.e) + '</span><span class="meaning">' + c.m + '</span>'
    + '<div class="boxes">' + c.boxes.map(b =>
        '<div class="lbox">' + (b ? '<span class="m">' + b + '</span>' : '') + '</div>').join('')
    + '</div></div>').join('');
  return sheet(head(no, 'Tiles', 'Tile bank', 'คลังพยางค์', footTh)
    + instruct(1, 'Pick &amp; build', 'เลือกพยัญชนะต้นและสระ/ตัวสะกดจากคลัง มาต่อเป็นคำตามภาพ (ตัวแรกให้ไว้)')
    + cb + rb + '<div class="clue-grid" style="margin-top:12px">' + grid + '</div>'
    + EXTRA + foot(footTh));
}
SHEETS.push(tilesSheet(7, FOOT,
  ['ก','ด','จ','ป','ส','ม'],
  ['◌ิน','าน','าก','าม','◌ี','◌ู'],
  [
    {e:'😋', m:'กิน · eat',  boxes:['ก','','']},
    {e:'🟤', m:'ดิน · soil', boxes:['ด','','']},
    {e:'🍽️', m:'จาน · plate', boxes:['จ','','']},
    {e:'👄', m:'ปาก · mouth', boxes:['ป','','']},
    {e:'3️⃣', m:'สาม · three', boxes:['ส','','']},
    {e:'👍', m:'มี · have',  boxes:['ม','']},
  ]));

/* 8 — Picture → build the word into letter boxes (ghost model) */
function pictureBuildSheet(no, footTh, items){
  const grid = items.map(it => {
    const boxes = it.letters.map((ch,i) =>
      '<div class="lbox">' + (i === 0 ? '<span class="m">' + ch + '</span>' : '<span class="g">' + ch + '</span>') + '</div>'
    ).join('');
    return '<div class="clue"><span class="emoji">' + art(it.e) + '</span><span class="meaning">' + it.m + '</span>'
      + '<div class="boxes">' + boxes + '</div></div>';
  }).join('');
  return sheet(head(no, 'Picture build', 'Build the word', 'ต่อคำจากภาพ', footTh)
    + instruct(1, 'Trace &amp; build', 'ดูภาพ เขียนทับตัวจาง แล้วต่อให้เป็นคำ (ตัวแรกเป็นตัวเข้ม)')
    + '<div class="clue-grid">' + grid + '</div>'
    + EXTRA + foot(footTh));
}
SHEETS.push(pictureBuildSheet(8, FOOT, [
  {e:'🐟', m:'ปลา · fish',  letters:['ป','ล','า']},
  {e:'🍽️', m:'จาน · plate', letters:['จ','า','น']},
  {e:'⭐', m:'ดาว · star',  letters:['ด','า','ว']},
  {e:'👄', m:'ปาก · mouth', letters:['ป','า','ก']},
  {e:'😋', m:'กิน · eat',   letters:['ก','◌ิ','น']},
  {e:'👁️', m:'ตา · eye',   letters:['ต','า']},
]));

/* 9 — Word matrix: initials × vowels (write, then circle real words) */
function matrixSheet(no, footTh, vowels, rows){
  const thead = '<thead><tr><th class="corner"></th>' + vowels.map(v => '<th>' + v + '</th>').join('') + '</tr></thead>';
  const body = rows.map(r =>
    '<tr><td class="rh">' + r + '</td>' + vowels.map(() => '<td></td>').join('') + '</tr>').join('');
  return sheet(head(no, 'Matrix', 'Word matrix', 'ตารางต่อคำ', footTh)
    + instruct(1, 'Build every box', 'ประสมพยัญชนะ (แถว) กับสระ (คอลัมน์) เขียนในแต่ละช่อง')
    + instruct(2, 'Circle real words', 'วงกลมช่องที่อ่านได้เป็นคำจริง เช่น มา ตา ดี ปู')
    + '<table class="matrix">' + thead + '<tbody>' + body + '</tbody></table>'
    + EXTRA + foot(footTh));
}
SHEETS.push(matrixSheet(9, FOOT, ['า','◌ี','◌ู'], ['ก','ด','ต','ป','ม']));

/* 10 — Free build: letter bank + my own words */
function freeSheet(no, footTh, consBank, vowBank, hints){
  const cb = '<div class="bank c"><span class="bk-lbl">พยัญชนะ · consonants</span>'
    + consBank.map(c => '<span class="chip">' + c + '</span>').join('') + '</div>';
  const vb = '<div class="bank r"><span class="bk-lbl">สระ &amp; ตัวสะกด · vowels &amp; finals</span>'
    + vowBank.map(c => '<span class="chip">' + c + '</span>').join('') + '</div>';
  const slots = hints.map((h,i) =>
    '<div class="slot"><span class="num">' + (i+1) + '</span><span class="hint-th">' + h + '</span><span class="sline"></span></div>').join('');
  return sheet(head(no, 'Free build', 'My own words', 'สร้างคำของหนู', footTh)
    + instruct(1, 'Make real words', 'เลือกตัวอักษรจากคลัง มาต่อเป็นคำจริงตามใบ้ แล้วเขียนลงช่อง')
    + cb + vb + '<div class="slot-grid" style="margin-top:12px">' + slots + '</div>'
    + EXTRA + foot(footTh));
}
SHEETS.push(freeSheet(10, FOOT,
  ['ก','ด','ต','ป','ม','น','ส','ห','ง','จ'],
  ['า','◌ี','◌ู','◌ิ','-น','-ม','-ง','-ก'],
  ['คำว่า "สัตว์น้ำ" 🐟','คำว่า "ดวงดาว" ⭐','คำว่า "ของกิน" 😋','คำว่า "อวัยวะ" 👂','คำว่า "ภาชนะ" 🍽️','คำของหนูเอง ✏️']));

document.getElementById('sheets').innerHTML = SHEETS.join('');

/* auto-open the print dialog when launched with ?print=1 (app Print button) */
if (new URLSearchParams(location.search).has('print')){
  window.addEventListener('load', () => window.print());
}
