<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PANYA · Sentence Builder · เรียงประโยค</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4efe4; --surface:#fbf8f1; --line:#e3d9c4; --line-2:#d6c8ab;
    --ink:#2f2a20; --ink-2:#5c5341; --ink-3:#8a7e66;
    --leaf:#5b7a4b; --leaf-d:#45603a; --leaf-l:#e6eddf;
    --earth:#c98a3b; --earth-d:#a86d24; --earth-l:#f6e8d2;
    --clay:#b05c3c; --sky:#6f9bb0;
    --font:"Sarabun",system-ui,sans-serif; --thai:"Sarabun",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 1px 1px,rgba(120,100,60,.06) 1px,transparent 0);background-size:22px 22px;}
  .wrap{max-width:860px;margin:0 auto;padding:0 18px 60px;}
  .top{display:flex;align-items:center;gap:13px;padding:18px 0 8px;flex-wrap:wrap;}
  .home{text-decoration:none;background:var(--leaf);color:#fff;font-weight:700;border-radius:999px;padding:8px 15px;font-size:.85rem;box-shadow:inset 0 -3px 0 rgba(0,0,0,.14);}
  .logo{width:46px;height:46px;border-radius:12px;background:var(--leaf);color:#fff;display:grid;place-items:center;font-weight:800;font-size:21px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15);}
  .top .bn{font-weight:800;letter-spacing:.2em;font-size:18px;line-height:1;}
  .top .bs{font-size:12px;color:var(--ink-3);margin-top:2px;}
  .top .spacer{margin-left:auto;}
  .eyebrow{font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--earth-d);font-size:12px;margin:8px 0 2px;}
  h1{font-size:clamp(1.5rem,4vw,2rem);margin:0 0 4px;font-weight:800;}
  .sub{color:var(--ink-2);margin:0 0 14px;}
  .bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .lvchip{font-weight:700;font-size:.85rem;cursor:pointer;border:1.6px solid var(--line-2);background:var(--surface);color:var(--ink-3);border-radius:999px;padding:7px 15px;}
  .lvchip.on{background:var(--leaf);color:#fff;border-color:transparent;}
  .prog{margin-left:auto;font-weight:700;color:var(--ink-3);font-size:.9rem;}
  .prog b{color:var(--leaf-d);}
  .card{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 1px 0 rgba(60,48,28,.05);}
  .ins{font-family:var(--thai);color:var(--ink-2);margin:0 0 12px;font-size:1rem;}
  .answer{min-height:84px;border:2px dashed var(--line-2);border-radius:14px;background:#fff;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .answer.empty::before{content:"แตะคำด้านล่างมาเรียงที่นี่ · tap words to build the sentence";color:var(--ink-3);font-size:.95rem;}
  .answer.ok{border-color:var(--leaf);background:var(--leaf-l);}
  .answer.bad{border-color:var(--clay);}
  .bankrow{margin-top:16px;display:flex;flex-wrap:wrap;gap:10px;}
  .w{font-family:var(--thai);font-size:1.5rem;border:1.8px solid var(--line-2);border-radius:13px;background:#fff;color:var(--ink);
     padding:9px 18px;cursor:pointer;user-select:none;transition:transform .08s,background .12s;-webkit-tap-highlight-color:transparent;}
  .w:hover{background:var(--earth-l);}
  .w:active{transform:translateY(1px);}
  .answer .w{background:var(--leaf);color:#fff;border-color:var(--leaf-d);}
  .answer .w.wrong{background:var(--clay);border-color:var(--clay);}
  .answer .w.right{background:var(--leaf);border-color:var(--leaf-d);}
  .feedback{min-height:30px;margin:14px 0 4px;font-family:var(--thai);font-weight:700;font-size:1.15rem;text-align:center;}
  .feedback.good{color:var(--leaf-d);} .feedback.bad{color:var(--clay);}
  .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
  .btn{border:none;border-radius:12px;font-family:inherit;font-weight:800;font-size:1rem;padding:12px 22px;cursor:pointer;color:#fff;box-shadow:inset 0 -4px 0 rgba(0,0,0,.13);}
  .btn.check{background:var(--leaf);} .btn.check:hover{background:var(--leaf-d);}
  .btn.ghost{background:var(--surface);color:var(--ink-2);border:1.6px solid var(--line-2);box-shadow:none;}
  .btn.ghost:hover{border-color:var(--ink);}
  .btn.next{background:var(--earth);} .btn.next:hover{background:var(--earth-d);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .done{text-align:center;padding:40px 16px;}
  .done .big{font-size:60px;}
  @media(max-width:540px){ .w{font-size:1.3rem;padding:9px 14px;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="logo">P</span>
    <div><div class="bn">PANYA</div><div class="bs">Sentence Builder · เรียงประโยค</div></div>
    <span class="spacer"></span>
    <a class="home" href="./Panyaden%20Thai%20Literacy.html">← หน้าหลัก</a>
  </div>

  <div class="eyebrow">Interactive · ฝึกโครงสร้างประโยค</div>
  <h1>เรียงคำให้เป็นประโยค</h1>
  <p class="sub">แตะคำมาเรียงให้ถูกต้อง (ประธาน–กริยา–กรรม) แล้วกด “ตรวจ” · tap the words into the right order</p>

  <div class="bar">
    <div class="chips" id="levels"></div>
    <div class="prog" id="prog"></div>
  </div>

  <div id="game">
    <div class="card">
      <p class="ins" id="ins"></p>
      <div class="answer empty" id="answer"></div>
      <div class="bankrow" id="bank"></div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn check" id="checkBtn">✓ ตรวจ · Check</button>
        <button class="btn ghost" id="shuffleBtn">🔀 สลับ</button>
        <button class="btn ghost" id="revealBtn">เฉลย</button>
        <button class="btn next" id="nextBtn">ถัดไป →</button>
      </div>
    </div>
  </div>

  <div class="card done" id="done" style="display:none">
    <div class="big">🌟</div>
    <h2 id="doneTitle"></h2>
    <p class="sub" id="doneSub"></p>
    <div class="actions"><button class="btn check" id="againBtn">เล่นอีกครั้ง · Play again</button></div>
  </div>
</div>

<script>
const DATA = [
  { lv:"Y4", words:["น้อง","กิน","ข้าว"] },
  { lv:"Y4", words:["พี่","ไป","โรงเรียน","ทุกวัน"] },
  { lv:"Y4", words:["แมว","นอน","อยู่","บน","เก้าอี้"] },
  { lv:"Y4", words:["คุณยาย","ปลูก","ต้นไม้","ที่","สวน"] },
  { lv:"Y5", words:["ฉัน","ชอบ","อ่านหนังสือ","และ","วาดรูป"] },
  { lv:"Y5", words:["นักเรียน","ตั้งใจเรียน","เพราะ","อยากสอบได้"] },
  { lv:"Y5", words:["ฝนตกหนัก","จึง","ถนน","เปียก"] },
  { lv:"Y5", words:["พ่อ","พา","ครอบครัว","ไปเที่ยว","ทะเล"] },
  { lv:"Y6", words:["เมื่อเช้านี้","นกตัวเล็ก","บินไปเกาะ","บนกิ่งไม้","อย่างรวดเร็ว"] },
  { lv:"Y6", words:["ชาวนา","ขยันทำงาน","ในนา","ตั้งแต่","เช้าตรู่"] },
  { lv:"Y6", words:["ถ้า","เราช่วยกัน","รักษาป่า","โลก","ก็จะน่าอยู่"] },
  { lv:"Y6", words:["หนังสือ","เล่มนี้","ให้ทั้ง","ความรู้","และความสนุก"] },
];

let level="all", pool=[], i=0, built=[], bank=[], checked=false, score=0;
const $=id=>document.getElementById(id);
const shuffle=a=>{ a=a.slice(); for(let k=a.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [a[k],a[j]]=[a[j],a[k]]; } return a; };

// level chips
const LV=["all","Y4","Y5","Y6"], LVLAB={all:"ทั้งหมด",Y4:"Y4",Y5:"Y5",Y6:"Y6"};
LV.forEach(l=>{ const b=document.createElement("button"); b.className="lvchip"+(l==="all"?" on":""); b.textContent=LVLAB[l]; b.dataset.l=l;
  b.onclick=()=>{ level=l; [...$("levels").children].forEach(c=>c.classList.toggle("on",c.dataset.l===l)); start(); }; $("levels").appendChild(b); });

function start(){
  pool = shuffle(DATA.filter(d=>level==="all"||d.lv===level));
  i=0; score=0; $("game").style.display=""; $("done").style.display="none"; load();
}
function load(){
  const q=pool[i]; built=[]; bank=shuffle(q.words); checked=false;
  $("ins").innerHTML = "ระดับ <b>"+q.lv+"</b> · เรียงให้เป็นประโยคที่ถูกต้อง";
  $("feedback").textContent=""; $("feedback").className="feedback";
  $("answer").className="answer empty"; $("nextBtn").disabled=true; $("checkBtn").disabled=false; $("revealBtn").disabled=false;
  $("prog").innerHTML="ข้อ <b>"+(i+1)+"</b> / "+pool.length+" · ถูก "+score;
  draw();
}
function draw(){
  const ans=$("answer"); ans.innerHTML="";
  ans.classList.toggle("empty",built.length===0);
  built.forEach((w,idx)=>{ const el=chip(w); if(!checked) el.onclick=()=>{ built.splice(idx,1); bank.push(w); draw(); }; ans.appendChild(el); });
  const bk=$("bank"); bk.innerHTML="";
  bank.forEach((w,idx)=>{ const el=chip(w); el.onclick=()=>{ if(checked) return; bank.splice(idx,1); built.push(w); draw(); }; bk.appendChild(el); });
}
function chip(w){ const el=document.createElement("button"); el.className="w"; el.textContent=w; return el; }

$("checkBtn").onclick=()=>{
  const q=pool[i]; if(built.length===0) return;
  checked=true;
  const correct = built.join("|")===q.words.join("|");
  const ans=$("answer");
  // mark each position
  [...ans.children].forEach((el,idx)=>{ el.classList.add(built[idx]===q.words[idx]?"right":"wrong"); });
  if(correct){ ans.className="answer ok"; $("feedback").textContent="✓ ถูกต้อง! เก่งมาก 🎉"; $("feedback").className="feedback good"; score++; $("nextBtn").disabled=false; $("checkBtn").disabled=true; }
  else { ans.className="answer bad"; $("feedback").textContent="ยังไม่ถูก — แตะคำที่อยู่ผิดออก แล้วลองใหม่"; $("feedback").className="feedback bad"; checked=false; /* allow editing again */ [...ans.children].forEach(el=>el.onclick=()=>{}); draw(); }
  $("prog").innerHTML="ข้อ <b>"+(i+1)+"</b> / "+pool.length+" · ถูก "+score;
};
$("shuffleBtn").onclick=()=>{ if(checked) return; bank=shuffle(bank.concat(built)); built=[]; draw(); $("answer").className="answer empty"; };
$("revealBtn").onclick=()=>{ const q=pool[i]; built=q.words.slice(); bank=[]; checked=true; draw();
  [...$("answer").children].forEach(el=>el.classList.add("right")); $("answer").className="answer ok";
  $("feedback").textContent="เฉลย — อ่านออกเสียงตามให้ถูก"; $("feedback").className="feedback good";
  $("nextBtn").disabled=false; $("checkBtn").disabled=true; };
$("nextBtn").onclick=()=>{ i++; if(i>=pool.length) finish(); else load(); };
$("againBtn").onclick=start;
function finish(){ $("game").style.display="none"; $("done").style.display="";
  $("doneTitle").textContent="ทำครบแล้ว! ได้ "+score+" / "+pool.length;
  $("doneSub").textContent = score===pool.length? "ยอดเยี่ยมมาก เรียงถูกทุกข้อ!" : "เก่งมาก ลองเล่นอีกครั้งเพื่อให้คล่องขึ้น"; }

start();
</script>
</body>
</html>
