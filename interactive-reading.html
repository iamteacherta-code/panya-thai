    qs:[
      {q:"ภาวะโลกร้อนหมายถึงอะไร?",o:["อุณหภูมิของโลกสูงขึ้น","โลกหมุนเร็วขึ้น","ฝนตกน้อยลง"],a:0},

          "คนที่ซื่อสัตย์ย่อมได้รับความไว้วางใจจากผู้อื่น",

    qs:[
      {q:"ความซื่อสัตย์หมายถึงอะไร?",o:["พูดความจริงและทำสิ่งที่ถูกต้อง","ทำตามใจตนเอง","เอาชนะผู้อื่น"],a:0},
      {q:"คนซื่อสัตย์จะได้รับสิ่งใด?",o:["ความไว้วางใจ","เงินทอง","อำนาจ"],a:0},
      {q:"ใจความสำคัญของเรื่องนี้คือข้อใด?",o:["ความซื่อสัตย์ทำให้สังคมสงบสุข","การทำงานหนัก","การออมเงิน"],a:0},
    ],
    reflect:"หนูเคยทำสิ่งที่แสดงถึงความซื่อสัตย์อย่างไรบ้าง?" },
  { lv:"Y6", title:"เทคโนโลยีกับชีวิต",
    text:["เทคโนโลยีเข้ามามีบทบาทในชีวิตประจำวันของเรามากขึ้น",
          "เราใช้คอมพิวเตอร์และโทรศัพท์ในการเรียน ทำงาน และติดต่อสื่อสาร",
          "แต่เราควรใช้เทคโนโลยีอย่างพอดีและรู้เท่าทัน ไม่ให้กระทบต่อสุขภาพและการเรียน"],
    qs:[
      {q:"เรื่องนี้กล่าวถึงสิ่งใด?",o:["เทคโนโลยีในชีวิตประจำวัน","การเล่นกีฬา","การทำสวน"],a:0},
      {q:"เราใช้เทคโนโลยีทำสิ่งใดตามเรื่อง?",o:["ติดต่อสื่อสาร","ปลูกข้าว","เลี้ยงสัตว์"],a:0},
      {q:"ผู้เขียนแนะนำให้ใช้เทคโนโลยีอย่างไร?",o:["อย่างพอดีและรู้เท่าทัน","ใช้ตลอดเวลา","ไม่ใช้เลย"],a:0},
    ],
    reflect:"หนูใช้เทคโนโลยีให้เกิดประโยชน์อย่างไรบ้าง?" },
  { lv:"Y6", title:"พลังของน้ำใจ",
    text:["น้ำใจคือความปรารถนาดีและการช่วยเหลือผู้อื่นโดยไม่หวังสิ่งตอบแทน",
          "การแบ่งปันเพียงเล็กน้อยก็อาจสร้างรอยยิ้มให้ผู้ที่กำลังลำบากได้",
          "เมื่อเรามีน้ำใจต่อกัน สังคมก็จะอบอุ่นและน่าอยู่ยิ่งขึ้น"],
    qs:[
      {q:"น้ำใจหมายถึงอะไร?",o:["ช่วยเหลือผู้อื่นโดยไม่หวังผลตอบแทน","ทำเพื่อเงิน","ทำเพื่อชื่อเสียง"],a:0},
      {q:"การแบ่งปันเล็กน้อยมีผลอย่างไร?",o:["สร้างรอยยิ้มแก่ผู้ที่ลำบาก","ทำให้เสียของ","ไม่มีประโยชน์"],a:0},
      {q:"ใจความสำคัญของเรื่องคือข้อใด?",o:["น้ำใจทำให้สังคมน่าอยู่","การออมเงิน","การแข่งขัน"],a:0},

    reflect:"หนูเคยมีน้ำใจช่วยเหลือผู้อื่นอย่างไรบ้าง?" },

    text:["เวลาเป็นสิ่งมีค่าที่ผ่านไปแล้วไม่อาจเรียกกลับคืนมาได้",
          "ผู้ที่รู้จักแบ่งเวลาเรียน เล่น และพักผ่อนอย่างเหมาะสม มักประสบความสำเร็จ",
          "ดังนั้นเราจึงควรใช้เวลาแต่ละวันให้เกิดประโยชน์มากที่สุด"],
    qs:[
      {q:"เหตุใดเวลาจึงมีค่า?",o:["ผ่านไปแล้วเรียกคืนไม่ได้","ซื้อขายกันได้","มีอยู่ไม่จำกัด"],a:0},
      {q:"ผู้ที่ประสบความสำเร็จมักทำสิ่งใด?",o:["แบ่งเวลาอย่างเหมาะสม","นอนทั้งวัน","เล่นอย่างเดียว"],a:0},
      {q:"ผู้เขียนต้องการบอกอะไร?",o:["ใช้เวลาให้เกิดประโยชน์","เวลาไม่สำคัญ","รีบโตเป็นผู้ใหญ่"],a:0},
    ],
    reflect:"หนูวางแผนใช้เวลาในแต่ละวันอย่างไร?" },
];
const $=id=>document.getElementById(id);
let level="all", pool=[], i=0, answered=0, score=0;

["all","Y4","Y5","Y6"].forEach(l=>{ const b=document.createElement("button"); b.className="lvchip"+(l==="all"?" on":""); b.textContent=l==="all"?"ทั้งหมด":l; b.dataset.l=l;
  b.onclick=()=>{ level=l; [...$("levels").children].forEach(c=>c.classList.toggle("on",c.dataset.l===l)); start(); }; $("levels").appendChild(b); });

function start(){ pool=STORIES.filter(s=>level==="all"||s.lv===level); i=0;score=0;answered=0; render(); }
function render(){
  const s=pool[i]; if(!s){ $("view").innerHTML=""; return; }
  $("prog").innerHTML="เรื่อง <b>"+(i+1)+"</b> / "+pool.length+" · คะแนน "+score;
  let h='<div class="card"><div class="passage"><div class="pt">['+s.lv+'] '+s.title+'</div>'+s.text.map(p=>'<p style="margin:0 0 6px">'+p+'</p>').join('')+'</div>';
  s.qs.forEach((q,qi)=>{ h+='<div class="q" data-qi="'+qi+'"><div class="qt">'+(qi+1)+'. '+q.q+'</div>'+q.o.map((o,oi)=>'<button class="opt" data-oi="'+oi+'">'+o+'</button>').join('')+'</div>'; });
  h+='<div class="q"><div class="qt">✍️ '+s.reflect+'</div><textarea placeholder="เขียนความคิดของหนู…"></textarea></div>';
  h+='<div class="feedback" id="fb"></div><div class="actions"><button class="btn next" id="nextBtn" disabled>'+(i<pool.length-1?"เรื่องต่อไป →":"ดูสรุป")+'</button></div></div>';
  $("view").innerHTML=h;
  let done=0;
  s.qs.forEach((q,qi)=>{
    const box=$("view").querySelector('.q[data-qi="'+qi+'"]');
    box.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        if(box.dataset.done) return; box.dataset.done="1"; done++; answered++;
        const oi=+btn.dataset.oi;
        if(oi===q.a){ btn.classList.add("right"); score++; }
        else { btn.classList.add("wrong"); box.querySelectorAll(".opt")[q.a].classList.add("right"); }
        box.querySelectorAll(".opt").forEach(b=>b.disabled=true);
        $("prog").innerHTML="เรื่อง <b>"+(i+1)+"</b> / "+pool.length+" · คะแนน "+score;
        if(done===s.qs.length){ $("fb").textContent="ทำคำถามครบแล้ว 👍"; $("fb").className="feedback good"; $("nextBtn").disabled=false; }
      };
    });
  });
  $("nextBtn").onclick=()=>{ i++; if(i>=pool.length) finish(); else render(); };
}
function finish(){ const total=pool.reduce((n,s)=>n+s.qs.length,0);
  $("view").innerHTML='<div class="card done"><div class="big">📖</div><h2>อ่านครบแล้ว! ตอบถูก '+score+' / '+total+'</h2><p class="sub">'+(score===total?"ยอดเยี่ยม เข้าใจเรื่องดีมาก!":"เก่งมาก ลองอ่านซ้ำเพื่อจับใจความให้แม่นขึ้น")+'</p><div class="actions"><button class="btn check" id="again">เริ่มใหม่</button></div></div>';
  $("again").onclick=start; $("prog").innerHTML="";
}
start();
</script>
